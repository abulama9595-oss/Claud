<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental Clinic · Financial Model</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <!-- shared financial engine (must load before the Babel app script) -->
  <script src="engine.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F1EDE4; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .items-baseline { align-items: baseline; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .grid { display: grid; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: #DBD4C5; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; margin-top: -5px; background: var(--accent, #B0823A); cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { ComposedChart, Bar, Line, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ReferenceLine, ReferenceDot, PieChart, Pie, Legend } = window.Recharts;

    /* ---- lucide icon stubs ---- */
    const _icon = (paths) => ({ size=24, color='currentColor', strokeWidth=2, style }) =>
      React.createElement('svg', { width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:color, strokeWidth, strokeLinecap:'round', strokeLinejoin:'round', style },
        ...paths.map((d,i) => React.createElement('path', { key:i, d })));

    const Save = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
    );
    const Trash2 = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
    );
    const AlertTriangle = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    );
    const RotateCcw = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
      </svg>
    );
    const FolderOpen = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="2 10 22 10"/>
      </svg>
    );
    const TrendingUp = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
      </svg>
    );
    const Info = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
    );

    /* ---------- small components ---------- */
    function Slider({ label, value, min, max, step, unit, onChange, hint, danger }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div className="flex items-baseline justify-between" style={{ marginBottom: 4 }}>
            <label style={{ fontFamily: SANS, fontSize: 12.5, color: C.text, fontWeight: 500 }}>{label}</label>
            <span style={{ fontFamily: MONO, fontSize: 13, fontWeight: 600, color: danger ? C.neg : C.ink, letterSpacing: "-0.02em" }}>
              {typeof value === "number" && value % 1 !== 0 ? value.toFixed(2) : value.toLocaleString("en-US")}<span style={{ color: C.sub, fontWeight: 400, marginLeft: 3 }}>{unit}</span>
            </span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={(e) => onChange(parseFloat(e.target.value))}
            style={{ width: "100%", '--accent': danger ? C.neg : C.brass, height: 4, cursor: "pointer" }} />
          {hint && <div style={{ fontFamily: SANS, fontSize: 11, color: danger ? C.neg : C.sub, marginTop: 3 }}>{hint}</div>}
        </div>
      );
    }
    function Card({ title, n, children }) {
      return (
        <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "16px 18px" }}>
          <div className="flex items-center" style={{ gap: 8, marginBottom: 14 }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.brass, fontWeight: 700 }}>{n}</span>
            <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>{title}</h3>
          </div>
          {children}
        </div>
      );
    }
    function Chip({ label, value, sub, color }) {
      return (
        <div style={{ flex: "1 1 130px", minWidth: 120, padding: "10px 14px", borderLeft: `2px solid ${color || C.brass}` }}>
          <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.07em", textTransform: "uppercase", color: C.invSub, marginBottom: 4 }}>{label}</div>
          <div style={{ fontFamily: MONO, fontSize: 22, fontWeight: 600, color: color || C.inv, letterSpacing: "-0.03em", lineHeight: 1 }}>{value}</div>
          {sub && <div style={{ fontFamily: SANS, fontSize: 10.5, color: C.invSub, marginTop: 3 }}>{sub}</div>}
        </div>
      );
    }

    const th = { padding: "9px 14px", textAlign: "right", fontSize: 11, fontWeight: 700, color: "#fff", background: "#15263B", letterSpacing: "0.04em", fontFamily: SANS };
    const td = { padding: "6px 14px", textAlign: "right", borderBottom: "1px solid #ECE7DA", letterSpacing: "-0.02em", whiteSpace: "nowrap" };
    const iconBtn = { background: "transparent", border: "none", cursor: "pointer", padding: 3, display: "flex", alignItems: "center", borderRadius: 5 };
    function btn(bg, color, border) {
      return { display: "inline-flex", alignItems: "center", gap: 6, background: bg, color, border: `1px solid ${border || bg}`, borderRadius: 7, padding: "8px 13px", fontFamily: SANS, fontSize: 12.5, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" };
    }

    /* ---------- main ---------- */
    function App() {
      const [inp, setInp] = useState(BASE_INPUTS);
      const set = useCallback((k, v) => setInp((p) => ({ ...p, [k]: v })), []);
      const m = useMemo(() => compute(inp), [inp]);

      // sensitivity & break-even: one-way ±20% swings on the drivers that matter, plus two break-even points
      const sens = useMemo(() => {
        const drivers = [
          ["Revenue per chair", "revPerChair"],
          ["Y1 utilization", "rampStart"],
          ["Materials & lab %", "materialsPct"],
          ["Dentist profit share", "profitShare"],
          ["Exit multiple", "exitMultiple"],
        ];
        const rows = drivers.map(([label, k]) => [label, compute({ ...inp, [k]: inp[k] * 0.8 }).npv, compute({ ...inp, [k]: inp[k] * 1.2 }).npv]);
        // break-even revenue per chair: NPV = 0 (bisection; NPV is monotonic in revPerChair)
        let beRev = null;
        let lo = 0, hi = Math.max(100, inp.revPerChair * 2);
        if (compute({ ...inp, revPerChair: lo }).npv < 0 && compute({ ...inp, revPerChair: hi }).npv > 0) {
          for (let k = 0; k < 30; k++) { const mid = (lo + hi) / 2; if (compute({ ...inp, revPerChair: mid }).npv < 0) lo = mid; else hi = mid; }
          beRev = (lo + hi) / 2;
        }
        // lowest Y1 utilization the funding budget survives
        let minUtil = null;
        for (let u = 0; u <= 100; u += 1) { if (compute({ ...inp, rampStart: u }).fundingOk) { minUtil = u; break; } }
        return { rows, beRev, minUtil };
      }, [inp]);

      const storage = null; // no Claude storage in standalone mode
      const [saved, setSaved] = useState([]);
      const [scenName, setScenName] = useState("");
      const [toast, setToast] = useState(null);
      const flash = (t) => { setToast(t); setTimeout(() => setToast(null), 2200); };

      const saveScenario = () => {
        const name = scenName.trim();
        if (!name) { flash("Name the scenario first"); return; }
        const id = name.replace(/[\s/\\'"]+/g, "_").slice(0, 60);
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        existing[id] = { name, inputs: inp, ts: Date.now() };
        localStorage.setItem("dental_scenarios", JSON.stringify(existing));
        setScenName(""); flash(`Saved "${name}"`);
        loadList();
      };
      const loadList = useCallback(() => {
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        const out = Object.entries(existing).map(([key, v]) => ({ key, ...v }));
        out.sort((a, b) => (b.ts || 0) - (a.ts || 0));
        setSaved(out);
      }, []);
      useEffect(() => { loadList(); }, [loadList]);
      const loadScenario = (s) => { setInp({ ...BASE_INPUTS, ...s.inputs }); flash(`Loaded "${s.name}"`); };
      const deleteScenario = (s) => {
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        delete existing[s.key];
        localStorage.setItem("dental_scenarios", JSON.stringify(existing));
        flash(`Deleted "${s.name}"`); loadList();
      };

      const chartData = m.years.map((y) => ({ year: y.year, Revenue: Math.round(y.revenue), EBITDA: Math.round(y.ebitda), "Net income": Math.round(y.ni) }));

      // opening & year-1 budget: total cash required to open and operate through M12
      const budget = (() => {
        const preOpen = preOpeningCost(inp);
        const vat = vatOnCapex(inp);
        const rentCheque1 = (inp.clinicRent + inp.staffHousing) * LEASE_ESC[0] * rentUpfrontFactor(inp);
        const insPrem = inp.insuranceCCHI * STAFF_RAMP[0] + (inp.dentistCount * inp.malpracticePerDentist) / 1000;
        const staffOnboard = preOpen - rentCheque1 - insPrem;
        const capexInvest = m.investCapex;                         // all CapEx lines (WC reserve no longer guessed)
        const opShortfall = Math.max(0, m.peakNeed - preOpen - vat);
        const hardAssets = hardCapex(inp);
        const softCosts = (inp.capexLicensing || 0) + (inp.capexConsultants || 0) + (inp.capexRecruitment || 0);
        const inventory = inp.capexInventory || 0;
        const contingency = inp.capexContingency || 0;
        const launchLiquidity = m.launchLiquidity;                  // = peak cumulative cash deficit
        const minCash = m.minCashReserve;                           // deliberate liquidity policy cushion
        const wcDerived = launchLiquidity + minCash;                // derived working capital (replaces the old guess)
        const totalRaise = m.totalRaise;
        const totalRequired = totalRaise, totalBudget = totalRaise, buffer = minCash;
        const by1 = m.years[0];
        const opexY1 = by1.fixedStaff + by1.share + by1.materials + by1.lease + by1.mkt + by1.other + by1.insUtil + by1.foreign;
        const netRevY1 = by1.revenue - by1.denials;
        return { preOpen, vat, rentCheque1, insPrem, staffOnboard, capexInvest, opShortfall, hardAssets, softCosts, inventory, contingency, launchLiquidity, minCash, wcDerived, totalRaise, totalRequired, totalBudget, buffer, opexY1, netRevY1, ebitdaY1: by1.ebitda };
      })();
      const rentChequeLabel = inp.rentTerms === "grace" ? `Rent during fit-out (${inp.fitoutMonths}-month grace — waived)` : inp.rentTerms === "semiannual" ? `Semi-annual rent instalments before opening` : `First annual rent cheque (P${inp.fitoutMonths})`;
      const budgetPie = [
        { name: "Facility fit-out", value: inp.capexFitout },
        { name: "Clinical equipment", value: inp.capexChairs + inp.capexImaging + inp.capexCSSD },
        { name: "IT, furniture & inventory", value: inp.capexIT + inp.capexFurniture + inp.capexInventory },
        { name: "Soft costs & compliance", value: inp.capexLicensing + inp.capexCivilDefence + inp.capexConsultants + inp.capexRecruitment },
        { name: "Contingency", value: inp.capexContingency },
        { name: "Launch liquidity", value: budget.launchLiquidity },
        { name: "Minimum-cash reserve", value: budget.minCash },
      ].filter(d => d.value > 0);
      const PIE_COLORS = { "Facility fit-out": "#15263B", "Clinical equipment": "#27384E", "IT, furniture & inventory": "#64707C", "Soft costs & compliance": "#9DAEC0", "Contingency": "#D9B36A", "Launch liquidity": "#B0823A", "Minimum-cash reserve": "#2E7D63" };
      const budgetCapexRows = [
        ["Facility fit-out", "capexFitout"], ["Chairs & accessories", "capexChairs"], ["Imaging equipment", "capexImaging"],
        ["Sterilisation / CSSD", "capexCSSD"], ["IT & systems", "capexIT"], ["Furniture & fittings", "capexFurniture"],
        ["Initial inventory", "capexInventory"], ["Licensing, legal & CR", "capexLicensing"], ["Civil Defence", "capexCivilDefence"],
        ["Consultants & PMC", "capexConsultants"], ["Foreign-staff recruitment", "capexRecruitment"], ["Contingency", "capexContingency"],
      ];
      const bRow = { display: "flex", justifyContent: "space-between", padding: "3.5px 0", fontFamily: SANS, fontSize: 12.5, color: C.text };
      const bVal = { fontFamily: MONO, fontSize: 12.5 };
      const bSub = { display: "flex", justifyContent: "space-between", padding: "7px 0 0", marginTop: 6, borderTop: `1px solid ${C.line}`, fontFamily: SANS, fontSize: 12.5, fontWeight: 700, color: C.text };
      const bTitle = { fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.brass, marginBottom: 8 };

      const pnlRows = [
        ["Revenue", "revenue", "head"], ["Claims denied", "denials", "neg"], ["Materials & lab", "materials", "neg"], ["Gross profit", "gp", "sub"],
        ["Fixed staff (incl. dentist base)", "fixedStaff", "neg"], ["Lease & housing", "lease", "neg"],
        ["Marketing", "mkt", "neg"], ["Other OpEx", "other", "neg"], ["Insurance, utilities & waste", "insUtil", "neg"], ["Foreign-labour fees", "foreign", "neg"],
        ["Operating profit b/f share", "preshare", "sub"], ["Dentist profit share", "share", "neg"],
        ["EBITDA", "ebitda", "head"], ["Depreciation", "dep", "neg"], ["Zakat", "zakat", "neg"], ["Net income", "ni", "head"],
        ["Free cash flow", "fcf", "head"],
      ];

      return (
        <div style={{ background: C.bone, minHeight: "100vh", fontFamily: SANS, color: C.text }}>
          <div style={{ position: "sticky", top: 0, zIndex: 20, background: C.ink, borderBottom: `1px solid ${C.lineDk}` }}>
            <div style={{ maxWidth: 1180, margin: "0 auto", padding: "16px 22px" }}>
              <div className="flex flex-wrap items-center justify-between" style={{ gap: 12, marginBottom: 6 }}>
                <div>
                  <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", color: C.brassLt }}>Dental Clinic · Riyadh — 10 Operatories</div>
                  <div style={{ fontFamily: SANS, fontSize: 18, fontWeight: 700, color: C.inv, letterSpacing: "-0.01em" }}>Financial Model</div>
                </div>
                <div className="flex items-center" style={{ gap: 16 }}>
                  <div style={{ textAlign: "right", paddingRight: 16, borderRight: `1px solid ${C.lineDk}` }}>
                    <div style={{ fontFamily: SANS, fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: C.invSub }}>Funding to raise</div>
                    <div style={{ fontFamily: MONO, fontSize: 26, fontWeight: 700, color: C.brassLt, letterSpacing: "-0.02em", lineHeight: 1 }}>{f0(budget.totalRequired)}</div>
                    <div style={{ fontFamily: SANS, fontSize: 10, color: C.invSub, marginTop: 2 }}>SAR '000 · CapEx + cash to self-funding</div>
                    <div style={{ fontFamily: SANS, fontSize: 10.5, fontWeight: 600, color: C.pos, marginTop: 1 }}>
                      {`incl. ${f0(budget.minCash)} min-cash reserve (${inp.minCashMonths} mo opex)`}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: SANS, fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: C.invSub }}>Verdict</div>
                    <div style={{ fontFamily: MONO, fontSize: 26, fontWeight: 700, color: m.vColor, letterSpacing: "-0.02em", lineHeight: 1 }}>{m.verdict}</div>
                    {!m.fundingOk && <div style={{ fontFamily: SANS, fontSize: 10.5, fontWeight: 700, color: C.neg, marginTop: 2 }}>· underfunded</div>}
                  </div>
                  <TrendingUp size={26} color={m.vColor} strokeWidth={2} />
                </div>
              </div>
              <div className="flex flex-wrap" style={{ gap: 2, borderTop: `1px solid ${C.lineDk}`, paddingTop: 10 }}>
                <Chip label="Year-5 revenue" value={f0(m.y5.revenue)} sub="SAR '000" color={C.inv} />
                <Chip label="Year-5 EBITDA" value={f0(m.y5.ebitda)} sub={pctf(m.y5.ebitdaPct) + " margin"} color={m.y5.ebitda < 0 ? C.neg : C.brassLt} />
                <Chip label="Cumulative net income" value={f0(m.cumNI)} sub="Y1–Y5, SAR '000" color={m.cumNI < 0 ? C.neg : C.pos} />
                <Chip label="Capital payback" value={m.payback ? m.payback.toFixed(1) : "—"} sub="years (FCF)" color={C.inv} />
                <Chip label="Dentist pay (Y5)" value={"SAR " + m.perDentistMo.toFixed(1) + "K"} sub="per dentist / month" color={m.perDentistMo < 12 ? C.neg : C.inv} />
                <Chip label="Exit value" value={f0(m.exitValue)} sub={`${inp.exitMultiple}× Y5 EBITDA, SAR '000`} color={m.exitValue < 0 ? C.neg : C.brassLt} />
                <Chip label="5-yr IRR" value={m.irr == null ? "n/a" : pctf(m.irr * 100)} sub="incl. exit" color={C.inv} />
                <Chip label="Net income (Y5)" value={f0(m.y5.ni)} sub="SAR '000" color={m.y5.ni < 0 ? C.neg : C.pos} />
              </div>
            </div>
          </div>

          {m.saudization && (
            <div style={{ background: "#3A1E16", borderBottom: `1px solid #5A2E20` }}>
              <div style={{ maxWidth: 1180, margin: "0 auto", padding: "10px 22px", display: "flex", gap: 10, alignItems: "flex-start" }}>
                <AlertTriangle size={18} color={C.brassLt} style={{ flexShrink: 0, marginTop: 1 }} />
                <div style={{ fontFamily: SANS, fontSize: 12.5, color: "#F0D9C8", lineHeight: 1.5 }}>
                  <b style={{ color: C.brassLt }}>Saudization flag:</b> at a SAR {inp.dentistBase.toLocaleString()} registered base, Saudi dentists fall below the SAR 9,000 GOSI threshold required to count toward the mandatory 55% dental Saudization quota (effective 27 Jan 2026). Register Saudi dentists at ≥ SAR 9,000 base — about SAR 252K/year more.
                </div>
              </div>
            </div>
          )}

          <div style={{ maxWidth: 1180, margin: "0 auto", padding: "22px" }}>
            <div style={{ background: C.ink2, borderRadius: 10, padding: "14px 18px", marginBottom: 20 }}>
              <div className="flex flex-wrap items-center justify-between" style={{ gap: 12 }}>
                <div className="flex items-center" style={{ gap: 10, flex: "1 1 320px" }}>
                  <FolderOpen size={16} color={C.brassLt} />
                  <input value={scenName} onChange={(e) => setScenName(e.target.value)} placeholder="Name this scenario…"
                    onKeyDown={(e) => e.key === "Enter" && saveScenario()}
                    style={{ flex: 1, minWidth: 140, background: C.ink, border: `1px solid ${C.lineDk}`, borderRadius: 7, color: C.inv, fontFamily: SANS, fontSize: 13, padding: "8px 11px", outline: "none" }} />
                  <button onClick={saveScenario} style={btn(C.brass, C.ink)}><Save size={14} /> Save</button>
                  <button onClick={() => { setInp(BASE_INPUTS); flash("Reset to base case"); }} style={btn("transparent", C.brassLt, C.lineDk)}><RotateCcw size={14} /> Reset</button>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["Benchmark", 90], ["Conservative", 120], ["Base", 160], ["Upside", 200]].map(([lbl, v]) => (
                    <button key={lbl} onClick={() => set("revPerChair", v)}
                      style={{ ...btn(inp.revPerChair === v ? C.brass : "transparent", inp.revPerChair === v ? C.ink : C.invSub, C.lineDk), padding: "6px 10px", fontSize: 11.5 }}>{lbl}</button>
                  ))}
                </div>
              </div>
              {saved.length > 0 && (
                <div style={{ marginTop: 14, borderTop: `1px solid ${C.lineDk}`, paddingTop: 12 }}>
                  <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.1em", textTransform: "uppercase", color: C.invSub, marginBottom: 8 }}>Saved scenarios · stored locally</div>
                  <div className="grid" style={{ gap: 8, gridTemplateColumns: "repeat(auto-fill,minmax(230px,1fr))" }}>
                    {saved.map((s) => {
                      const sm = compute({ ...BASE_INPUTS, ...s.inputs });
                      return (
                        <div key={s.key} style={{ background: C.ink, border: `1px solid ${C.lineDk}`, borderRadius: 8, padding: "9px 11px" }}>
                          <div className="flex items-center justify-between" style={{ gap: 6 }}>

                          const neg = kind === "neg";
                          const isLoss = (key === "ebitda" || key === "ni" || key === "preshare") && v < 0;
                          return <td key={y.year} style={{ ...td, fontWeight: kind === "head" ? 700 : 400, color: isLoss ? C.neg : (neg ? C.sub : C.text) }}>{neg ? `(${f0(Math.abs(v))})` : f0(v)}</td>;
                        })}
                      </tr>
                    ))}
                    <tr>
                      <td style={{ ...td, textAlign: "left", fontFamily: SANS, fontStyle: "italic", color: C.sub }}>EBITDA margin</td>
                      {m.years.map((y) => <td key={y.year} style={{ ...td, color: y.ebitda < 0 ? C.neg : C.brass }}>{pctf(y.ebitdaPct)}</td>)}
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, lineHeight: 1.6, paddingBottom: 30 }}>
              Indicative model for planning, not investment or legal advice. Dentist pay = base salary + {inp.profitShare}% of operating profit (pooled, paid only when profit is positive). Benchmarks: Riyadh rents & 2025 rent freeze (SAT Real Estate, Knight Frank); salaries (PayScale, SalaryExpert, Paylab); Saudization 55% from 27 Jan 2026 & SAR 9,000 floor (Arab News, HRSD); expat levy SAR 800/mo + iqama/permit fees (MHRSD 2026 schedules). Validate all figures with local quotations before committing capital.
            </div>
          </div>

          {toast && (
            <div style={{ position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", background: C.ink, color: C.inv, fontFamily: SANS, fontSize: 13, fontWeight: 500, padding: "10px 18px", borderRadius: 8, border: `1px solid ${C.brass}`, zIndex: 50, boxShadow: "0 6px 24px rgba(0,0,0,0.25)" }}>{toast}</div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
