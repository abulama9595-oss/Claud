<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental Clinic · Financial Model</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <!-- shared financial engine (must load before the Babel app script) -->
  <script src="engine.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F1EDE4; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .items-baseline { align-items: baseline; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .grid { display: grid; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: #DBD4C5; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; margin-top: -5px; background: var(--accent, #B0823A); cursor: pointer; }
    html { scroll-behavior: smooth; }
    .navlink { cursor: pointer; transition: color .15s; }
    .navlink:hover { color: #D9B36A !important; }
    .print-only { display: none; }
    @media print {
      @page { margin: 12mm; }
      body { background: #fff !important; }
      .no-print { display: none !important; }
      input[type=range] { display: none !important; }
      .print-only { display: block !important; }
      .print-section { break-inside: avoid; }
      .print-break { break-before: page; }
      .sticky-bar { position: static !important; background: #fff !important; border-bottom: 1px solid #DBD4C5 !important; }
      .sticky-bar * { color: #1B2733 !important; }
      .app-shell { background: #fff !important; }
      .study-shell { background: #fff !important; padding: 0 !important; }
      .page { break-after: page; border: none !important; box-shadow: none !important; margin: 0 auto !important; border-radius: 0 !important; min-height: auto !important; padding: 6mm 2mm !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { ComposedChart, Bar, Line, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ReferenceLine, ReferenceDot, PieChart, Pie, Legend } = window.Recharts;

    /* ---- lucide icon stubs ---- */
    const _icon = (paths) => ({ size=24, color='currentColor', strokeWidth=2, style }) =>
      React.createElement('svg', { width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:color, strokeWidth, strokeLinecap:'round', strokeLinejoin:'round', style },
        ...paths.map((d,i) => React.createElement('path', { key:i, d })));

    const Save = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
    );
    const Trash2 = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
    );
    const AlertTriangle = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    );
    const RotateCcw = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
      </svg>
    );
    const FolderOpen = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="2 10 22 10"/>
      </svg>
    );
    const TrendingUp = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
      </svg>
    );
    const Info = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
    );
    const FileText = ({ size=24, color='currentColor', strokeWidth=2, style }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    );

    /* ---------- small components ---------- */
    function Slider({ label, value, min, max, step, unit, onChange, hint, danger }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div className="flex items-baseline justify-between" style={{ marginBottom: 4 }}>
            <label style={{ fontFamily: SANS, fontSize: 12.5, color: C.text, fontWeight: 500 }}>{label}</label>
            <span style={{ fontFamily: MONO, fontSize: 13, fontWeight: 600, color: danger ? C.neg : C.ink, letterSpacing: "-0.02em" }}>
              {typeof value === "number" && value % 1 !== 0 ? value.toFixed(2) : value.toLocaleString("en-US")}<span style={{ color: C.sub, fontWeight: 400, marginLeft: 3 }}>{unit}</span>
            </span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={(e) => onChange(parseFloat(e.target.value))}
            style={{ width: "100%", '--accent': danger ? C.neg : C.brass, height: 4, cursor: "pointer" }} />
          {hint && <div style={{ fontFamily: SANS, fontSize: 11, color: danger ? C.neg : C.sub, marginTop: 3 }}>{hint}</div>}
        </div>
      );
    }
    function Card({ title, n, children }) {
      return (
        <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "16px 18px" }}>
          <div className="flex items-center" style={{ gap: 8, marginBottom: 14 }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.brass, fontWeight: 700 }}>{n}</span>
            <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>{title}</h3>
          </div>
          {children}
        </div>
      );
    }
    function Chip({ label, value, sub, color }) {
      return (
        <div style={{ flex: "1 1 130px", minWidth: 120, padding: "10px 14px", borderLeft: `2px solid ${color || C.brass}` }}>
          <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.07em", textTransform: "uppercase", color: C.invSub, marginBottom: 4 }}>{label}</div>
          <div style={{ fontFamily: MONO, fontSize: 22, fontWeight: 600, color: color || C.inv, letterSpacing: "-0.03em", lineHeight: 1 }}>{value}</div>
          {sub && <div style={{ fontFamily: SANS, fontSize: 10.5, color: C.invSub, marginTop: 3 }}>{sub}</div>}
        </div>
      );
    }

    const th = { padding: "9px 14px", textAlign: "right", fontSize: 11, fontWeight: 700, color: "#fff", background: "#15263B", letterSpacing: "0.04em", fontFamily: SANS };
    const td = { padding: "6px 14px", textAlign: "right", borderBottom: "1px solid #ECE7DA", letterSpacing: "-0.02em", whiteSpace: "nowrap" };
    const iconBtn = { background: "transparent", border: "none", cursor: "pointer", padding: 3, display: "flex", alignItems: "center", borderRadius: 5 };
    function btn(bg, color, border) {
      return { display: "inline-flex", alignItems: "center", gap: 6, background: bg, color, border: `1px solid ${border || bg}`, borderRadius: 7, padding: "8px 13px", fontFamily: SANS, fontSize: 12.5, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" };
    }

    /* ---------- presentation components ---------- */
    function SectionHeader({ eyebrow, title, sub, meta }) {
      return (
        <div className="flex items-baseline justify-between" style={{ flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
          <div>
            {eyebrow && <div style={{ fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: C.brass, marginBottom: 4 }}>{eyebrow}</div>}
            <h2 style={{ fontFamily: SANS, fontSize: 19, fontWeight: 700, color: C.text, letterSpacing: "-0.01em", margin: 0 }}>{title}</h2>
            {sub && <div style={{ fontFamily: SANS, fontSize: 12.5, color: C.sub, marginTop: 4, maxWidth: 760 }}>{sub}</div>}
          </div>
          {meta && <div style={{ textAlign: "right" }}>{meta}</div>}
        </div>
      );
    }
    function KpiCard({ label, value, sub, accent, flag, flagColor }) {
      return (
        <div className="print-section" style={{ background: C.paper, border: `1px solid ${C.line}`, borderTop: `3px solid ${accent || C.brass}`, borderRadius: 9, padding: "13px 15px" }}>
          <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.06em", textTransform: "uppercase", color: C.sub, marginBottom: 5 }}>{label}</div>
          <div style={{ fontFamily: MONO, fontSize: 25, fontWeight: 700, color: accent || C.text, letterSpacing: "-0.03em", lineHeight: 1 }}>{value}</div>
          {sub && <div style={{ fontFamily: SANS, fontSize: 11, color: C.sub, marginTop: 5 }}>{sub}</div>}
          {flag && <div style={{ fontFamily: SANS, fontSize: 11, fontWeight: 600, color: flagColor || C.pos, marginTop: 3 }}>{flag}</div>}
        </div>
      );
    }
    const NAV_SECTIONS = [
      ["summary", "Summary"], ["outputs", "Key Outputs"], ["assumptions", "Assumptions"],
      ["funding", "Investment & Cash"], ["financials", "Financials"],
    ];

    /* ---------- executive feasibility study document ---------- */
    // Big-4-style advisory report, generated live from the model state. Market figures are
    // research-based (sources in Appendix); all financials are pulled from compute()/budget/sens.
    function StudyDocument({ inp, m, budget, sens, topRisk, chartData, budgetPie, pieColors, onClose }) {
      const TOTAL_PAGES = 10;
      const today = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
      const F = inp.fitoutMonths;
      const visitsDay = inp.revPerChair * 1000 / 500 / 26;
      const visitsYear = Math.round(inp.chairs * visitsDay * 26 * 12);
      const expat = expatCount(inp);
      const staffTotal = inp.dentistCount + Math.ceil(inp.chairs * inp.nursesPerChair) + inp.medicalSupportCount + inp.janitorCount + inp.driverCount + inp.generalStaffCount + 1;
      const saudiPct = staffTotal > 0 ? Math.max(0, Math.round(100 * (staffTotal - expat) / staffTotal)) : 0;
      const selfFund = (m.monthly.find(d => d.month.startsWith("M") && d["Cumulative"] >= 0) || {}).month;
      const cushion = sens.beRev != null && inp.revPerChair > 0 ? Math.round(100 * (inp.revPerChair - sens.beRev) / inp.revPerChair) : null;
      const rampY2 = Math.min(100, inp.rampStart * (1 + inp.rampGrowth / 100));
      const mktData = [{ y: "2022", v: 287 }, { y: "2024", v: 334 }, { y: "2026", v: 389 }, { y: "2028", v: 452 }, { y: "2030", v: 490 }];

      const page = { background: "#FFFFFF", border: `1px solid ${C.line}`, borderRadius: 6, maxWidth: 880, margin: "0 auto 26px", padding: "48px 56px 30px", boxShadow: "0 2px 16px rgba(14,26,43,0.07)", fontFamily: SANS, color: C.text, minHeight: 980, display: "flex", flexDirection: "column" };
      const secT = { fontFamily: SANS, fontSize: 17.5, fontWeight: 700, letterSpacing: "-0.01em", borderBottom: `2px solid ${C.brass}`, paddingBottom: 7, margin: "0 0 16px" };
      const subT = { fontFamily: SANS, fontSize: 12.5, fontWeight: 700, color: C.text, margin: "14px 0 6px" };
      const para = { fontSize: 12.3, lineHeight: 1.75, color: C.text, margin: "0 0 10px", textAlign: "justify" };
      const bull = { fontSize: 12.3, lineHeight: 1.7, color: C.text, margin: "0 0 5px 16px" };
      const tTh = { padding: "7px 10px", textAlign: "right", fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "#fff", background: C.ink2 };
      const tTd = { padding: "6px 10px", textAlign: "right", fontFamily: MONO, fontSize: 11.8, borderBottom: `1px solid ${C.line}`, whiteSpace: "nowrap" };
      const tLb = { ...tTd, textAlign: "left", fontFamily: SANS };
      const note = { fontSize: 10.5, color: C.sub, lineHeight: 1.6, marginTop: 8 };

      function Pg({ n, children }) {
        return (
          <div className="page print-section" style={page}>
            <div style={{ flex: 1 }}>{children}</div>
            <div className="flex justify-between" style={{ borderTop: `1px solid ${C.line}`, marginTop: 26, paddingTop: 8, fontFamily: SANS, fontSize: 9.5, color: C.sub, letterSpacing: "0.06em" }}>
              <span>PRIVATE &amp; CONFIDENTIAL · DENTAL CLINIC FEASIBILITY STUDY — RIYADH</span>
              <span>PAGE {n} OF {TOTAL_PAGES}</span>
            </div>
          </div>
        );
      }
      function Metric({ k, v, s }) {
        return (
          <div style={{ flex: "1 1 150px", border: `1px solid ${C.line}`, borderTop: `3px solid ${C.brass}`, borderRadius: 6, padding: "10px 13px" }}>
            <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.07em", textTransform: "uppercase", color: C.sub }}>{k}</div>
            <div style={{ fontFamily: MONO, fontSize: 19, fontWeight: 700, color: C.text, marginTop: 3 }}>{v}</div>
            {s && <div style={{ fontFamily: SANS, fontSize: 9.5, color: C.sub, marginTop: 2 }}>{s}</div>}
          </div>
        );
      }

      return (
        <div className="study-shell" style={{ background: C.bone, minHeight: "100vh", padding: "70px 18px 40px" }}>
          <div className="no-print" style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 40, background: C.ink, borderBottom: `1px solid ${C.lineDk}` }}>
            <div style={{ maxWidth: 880, margin: "0 auto", padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
              <button onClick={onClose} style={btn("transparent", C.brassLt, C.lineDk)}><RotateCcw size={14} /> Back to model</button>
              <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.invSub }}>Executive feasibility study · figures update live with the model</div>
              <button onClick={() => window.print()} style={btn(C.brass, C.ink)}><Save size={14} /> Print / PDF</button>
            </div>
          </div>

          {/* ——— Page 1 · Cover ——— */}
          <Pg n={1}>
            <div style={{ paddingTop: 60 }}>
              <div style={{ fontFamily: SANS, fontSize: 11, letterSpacing: "0.22em", textTransform: "uppercase", color: C.brass, fontWeight: 700 }}>Private &amp; Confidential · Draft for Discussion</div>
              <h1 style={{ fontFamily: SANS, fontSize: 31, fontWeight: 700, letterSpacing: "-0.015em", margin: "16px 0 8px", lineHeight: 1.25 }}>Feasibility Study:<br />Establishment of a {inp.chairs}-Chair Dental Clinic in Riyadh</h1>
              <div style={{ fontFamily: SANS, fontSize: 14, color: C.sub, marginBottom: 34 }}>Kingdom of Saudi Arabia · North Riyadh growth corridor · {today}</div>
              <div className="flex flex-wrap" style={{ gap: 12, marginBottom: 38 }}>
                <Metric k="Verdict" v={m.verdict} s={!m.fundingOk ? "⚠ underfunded" : undefined} />
                <Metric k="Capital required" v={`SAR ${f0(budget.totalRequired)}K`} s="all-in to self-funding" />
                <Metric k="5-year IRR" v={m.irr == null ? "n/a" : pctf(m.irr * 100)} s={`incl. exit at ${inp.exitMultiple}× EBITDA`} />
                <Metric k="NPV" v={`SAR ${f0(m.npv)}K`} s={`@ ${inp.wacc}% WACC`} />
              </div>
              <div style={{ fontFamily: SANS, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.brass, marginBottom: 8 }}>Contents</div>
              {["Executive Summary", "Market & Industry Analysis", "Location Assessment", "Business Model & Operating Plan", "Financial Projections", "Capital Requirements & Funding", "Risk Assessment & Sensitivity", "Implementation Roadmap", "Conclusion & Appendices"].map((s, i) => (
                <div key={s} className="flex justify-between" style={{ fontFamily: SANS, fontSize: 12, color: C.text, padding: "4px 0", borderBottom: `1px dotted ${C.line}`, maxWidth: 460 }}>
                  <span>{i + 1}.&nbsp;&nbsp;{s}</span><span style={{ fontFamily: MONO, color: C.sub }}>{i + 2}</span>
                </div>
              ))}
              <div style={{ ...note, marginTop: 30 }}>This document is generated directly from the interactive financial model; every figure reflects the assumption set in force at the time of viewing. It follows the structure of an executive advisory feasibility report and is intended for preliminary investment discussion, not as a substitute for site-level due diligence, legal, tax or regulatory advice.</div>
            </div>
          </Pg>

          {/* ——— Page 2 · Executive Summary ——— */}
          <Pg n={2}>
            <h2 style={secT}>1. Executive Summary</h2>
            <p style={para}>This study assesses the commercial and financial feasibility of establishing a {inp.chairs}-operatory private dental clinic in the northern growth corridor of Riyadh, Kingdom of Saudi Arabia. The assessment integrates a market review, a location screening, a five-year financial model with monthly cash simulation of the launch period, and a quantified risk analysis. All figures are stated in SAR '000 unless noted otherwise.</p>
            <p style={para}>The clinic requires total funding of <b>SAR {f0(budget.totalRequired)}K</b>, comprising SAR {f0(budget.capexInvest)}K of capital expenditure, SAR {f0(budget.preOpen + budget.vat)}K of pre-opening cash (including recoverable VAT), and SAR {f0(budget.opShortfall)}K of post-opening working capital consumed before the operation becomes self-funding{selfFund ? ` (achieved in ${selfFund})` : ""}. At a planned revenue of SAR {inp.revPerChair}K per chair per month — equivalent to {visitsDay.toFixed(1)} patient visits per chair per day at an average ticket of SAR 500 — the clinic matures to revenue of SAR {f0(m.y5.revenue)}K with an EBITDA margin of {pctf(m.y5.ebitdaPct)} by Year 5, {m.y5.ebitdaPct >= 25 ? "within or above" : "below"} the 25–30% range observed for well-run Saudi dental groups.</p>
            <p style={para}>On these assumptions the project returns a five-year IRR of <b>{m.irr == null ? "n/a" : pctf(m.irr * 100)}</b> (including a terminal sale at {inp.exitMultiple}× Year-5 EBITDA) and a net present value of <b>SAR {f0(m.npv)}K</b> at a {inp.wacc}% discount rate, with capital payback in {m.payback ? m.payback.toFixed(1) : "—"} years on free cash flow. Cumulative net income over the five-year horizon is SAR {f0(m.cumNI)}K after Zakat. The funding plan {m.fundingOk ? `covers the peak cash requirement of SAR ${f0(m.peakNeed)}K (${m.troughLabel}) with headroom of SAR ${f0(m.fundingBudget - m.peakNeed)}K` : `is short of the peak cash requirement of SAR ${f0(m.peakNeed)}K (${m.troughLabel}) by SAR ${f0(m.peakNeed - m.fundingBudget)}K`}.</p>
            <div style={subT}>Key indicators</div>
            <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 12 }}>
              <thead><tr><th style={{ ...tTh, textAlign: "left" }}>Indicator</th><th style={tTh}>Value</th><th style={{ ...tTh, textAlign: "left" }}>Indicator</th><th style={tTh}>Value</th></tr></thead>
              <tbody>
                <tr><td style={tLb}>Capital required (all-in)</td><td style={tTd}>{f0(budget.totalRequired)}</td><td style={tLb}>Year-5 revenue</td><td style={tTd}>{f0(m.y5.revenue)}</td></tr>
                <tr><td style={tLb}>Funded budget · buffer</td><td style={tTd}>{f0(budget.totalBudget)} · {budget.buffer >= 0 ? "+" : "−"}{f0(Math.abs(budget.buffer))}</td><td style={tLb}>Year-5 EBITDA (margin)</td><td style={tTd}>{f0(m.y5.ebitda)} ({pctf(m.y5.ebitdaPct)})</td></tr>
                <tr><td style={tLb}>5-year IRR (incl. exit)</td><td style={tTd}>{m.irr == null ? "n/a" : pctf(m.irr * 100)}</td><td style={tLb}>Year-5 net income</td><td style={tTd}>{f0(m.y5.ni)}</td></tr>
                <tr><td style={tLb}>NPV @ {inp.wacc}% WACC</td><td style={tTd}>{f0(m.npv)}</td><td style={tLb}>Cumulative net income Y1–Y5</td><td style={tTd}>{f0(m.cumNI)}</td></tr>
                <tr><td style={tLb}>Payback (free cash flow)</td><td style={tTd}>{m.payback ? m.payback.toFixed(1) + " yrs" : "—"}</td><td style={tLb}>Exit value ({inp.exitMultiple}× Y5 EBITDA)</td><td style={tTd}>{f0(m.exitValue)}</td></tr>
                <tr><td style={tLb}>Peak funding need</td><td style={tTd}>{f0(m.peakNeed)} ({m.troughLabel})</td><td style={tLb}>Break-even revenue / chair</td><td style={tTd}>{sens.beRev == null ? "—" : f0(sens.beRev) + "K"}</td></tr>
              </tbody>
            </table>
            <div style={subT}>Recommendation</div>
            <p style={para}>{m.verdict === "STRONG"

          <Pg n={3}>
            <h2 style={secT}>2. Market &amp; Industry Analysis</h2>
            <div style={subT}>2.1 Macro and policy environment</div>
            <p style={para}>Saudi Arabia's Vision 2030 Health Sector Transformation Program is re-shaping healthcare delivery, with a stated objective of raising the private sector's share of healthcare provision to approximately 65% by 2030. The privately insured base reached roughly 13 million beneficiaries under the Council of Health Insurance's mandatory employment-linked scheme, underpinning private outpatient demand. Riyadh is the principal beneficiary of this expansion: the city holds about 7.5 million residents, the wider province about 9 million (≈27% of the Kingdom), with official projections of 12.5 million by 2040, while the capital's bed density of ~1.7 per 1,000 population remains below the national (1.9) and global (2.9) averages — evidence of structural healthcare under-supply relative to population growth.</p>
            <div style={subT}>2.2 Dental services market</div>
            <p style={para}>Independent estimates place the Saudi dental care market at approximately USD 287 million in 2022, growing toward USD ~490 million by 2030 (≈7.9% CAGR); broader definitions of dental clinic services put the 2030 figure higher still. The supply side is expanding but remains thin by developed-market standards: the Kingdom's dentist workforce reached ~25,970 practitioners in 2023 (7.7 per 10,000 population), of whom roughly 70% practise in the private sector, and the Saudization share of dentists rose from 40% to 54% between 2019 and 2023 — directly relevant to this project's staffing and quota compliance strategy.</p>

            <h2 style={secT}>4. Business Model &amp; Operating Plan</h2>
            <p style={para}>The clinic operates {inp.chairs} operatories on a one-dentist-per-chair model ({inp.dentistCount} dentists), offering general and family dentistry with specialty services (orthodontics, prosthodontics, paediatric, implantology) under a single-shift, 26-day operating month. Dentist remuneration combines a base salary of SAR {f0(inp.dentistBase)}/month with a pooled profit share of {inp.profitShare}% of operating profit — aligning clinical earnings with clinic performance and limiting fixed-cost exposure during the ramp; mature dentist earnings equate to ≈SAR {m.perDentistMo.toFixed(1)}K/month.</p>

                {[

                  ["Clinical recruitment & Saudization", "M / H", `Dentist base ≥ SAR 9,000 GOSI floor; SAR ${f0(inp.capexRecruitment)}K recruitment budget; onboarding window P2–P1; rising Saudi dentist supply (54% of workforce, 2023)`],
                  ["Licensing / fit-out delay", "M / M", `${F}-month schedule; SAR ${f0(inp.capexContingency)}K contingency; ${inp.rentTerms === "grace" ? "rent-free fit-out grace negotiated" : "early MOH/Civil Defence engagement to protect the opening date"}`],
                  ["Insurer receivables & denials", "L–M / M", `${inp.insurerDelayMo}-month collection lag and ${inp.rejectionPct}% rejections explicitly modelled; SAR ${f0(inp.capexWorkingCapital)}K WC reserve sized to the ${m.troughLabel} trough`],
                  ["Competitive intensity (North Riyadh)", "M / M", "Differentiated multi-specialty offer; insurer network contracts from M1; corporate accounts via KAFD proximity"],

                  <tr key={r}><td style={tLb}>{r}</td><td style={{ ...tTd, fontFamily: SANS }}>{li}</td><td style={{ ...tLb, fontSize: 11 }}>{mit}</td></tr>
                ))}
              </tbody>
            </table>
            <div style={note}>L / I = indicative likelihood / impact. The dominant exposure is {topRisk[0].toLowerCase()} — the widest NPV swing in §7.1 — and should be the primary focus of pre-investment validation.</div>
          </Pg>

          {/* ——— Page 9 · Roadmap ——— */}
          <Pg n={9}>
            <h2 style={secT}>8. Implementation Roadmap</h2>
            <div className="flex" style={{ gap: 4, margin: "16px 0 6px" }}>
              {[
                [`P${F}–P3`, "Licensing, design & fit-out", C.ink2, 30],
                ["P2–P1", "Staff onboarding & credentialing", C.lineDk, 14],
                ["M1", "Opening", C.brass, 8],

                </div>
              ))}
            </div>
            <div style={subT}>Key milestones</div>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead><tr><th style={{ ...tTh, textAlign: "left" }}>Milestone</th><th style={tTh}>Timing</th><th style={{ ...tTh, textAlign: "left" }}>Cash / commercial significance</th></tr></thead>
              <tbody>
                <tr><td style={tLb}>CR, MISA &amp; SEHA licence applications; lease signature</td><td style={tTd}>P{F}</td><td style={tLb}>{inp.rentTerms === "grace" ? "Fit-out grace period begins" : `First rent cheque SAR ${f0((inp.clinicRent + inp.staffHousing) * rentUpfrontFactor(inp))}K`}; VAT outlays begin</td></tr>

                <tr><td style={tLb}>Peak funding requirement</td><td style={tTd}>{m.troughLabel}</td><td style={tLb}>SAR {f0(m.peakNeed)}K — deepest cash point; reserve must be in place</td></tr>
                <tr><td style={tLb}>Durable cash-positive position</td><td style={tTd}>{selfFund || "post-M24"}</td><td style={tLb}>Cumulative cash recovers above zero; reserve released</td></tr>
                <tr><td style={tLb}>Mature utilisation; audited track record</td><td style={tTd}>Y3</td><td style={tLb}>EBITDA SAR {f0(m.years[2].ebitda)}K run-rate established</td></tr>
                <tr><td style={tLb}>Exit / refinancing window</td><td style={tTd}>Y5</td><td style={tLb}>Indicative value SAR {f0(m.exitValue)}K at {inp.exitMultiple}× EBITDA</td></tr>
              </tbody>
            </table>
            <div style={note}>The critical path is regulatory (MOH/SEHA licence, Civil Defence, SFDA radiology approval and SCFHS credentialing, including DataFlow verification of 2–4 months per clinician) — these should be initiated at lease signature, not at fit-out completion.</div>
          </Pg>

          {/* ——— Page 10 · Conclusion & Appendix ——— */}
          <Pg n={10}>
            <h2 style={secT}>9. Conclusion &amp; Appendices</h2>
            <p style={para}>{m.verdict === "STRONG"
              ? `The proposed ${inp.chairs}-chair clinic presents a financially compelling case: a SAR ${f0(budget.totalRequired)}K total capital requirement generating a ${m.irr == null ? "n/a" : pctf(m.irr * 100)} five-year IRR, SAR ${f0(m.npv)}K of NPV and payback inside ${m.payback ? m.payback.toFixed(1) : "—"} years, in a market with structural tailwinds from Vision 2030 privatisation, mandatory insurance expansion and Riyadh's demographic growth. The conclusions are conditional on validating the per-chair revenue assumption and securing the funding envelope in full before lease commitment.`
              : m.verdict === "VIABLE"
              ? `The project clears viability thresholds but with modest headroom; the board should weigh the ${cushion != null ? cushion + "%" : ""} revenue cushion and funding adequacy before proceeding, and consider strengthening the working-capital reserve.`
              : `On the present assumptions the project does not meet investment criteria; a revised configuration (capacity, pricing or cost base) is required before further work.`}</p>
            <div style={subT}>Appendix A — Assumption register (current model state)</div>
            <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 12 }}>
              <tbody>
                {[
                  ["Revenue per chair / month · chairs", `SAR ${inp.revPerChair}K · ${inp.chairs}`],
                  ["Dentists · base · profit share", `${inp.dentistCount} · SAR ${f0(inp.dentistBase)}/mo · ${inp.profitShare}%`],
                  ["Y1 utilisation · ramp growth · price growth", `${inp.rampStart}% · ${inp.rampGrowth}%/yr · ${inp.revenueGrowth}%/yr`],
                  ["Insured share · rejections · collection lag", `${inp.insuredPct}% · ${inp.rejectionPct}% · ${inp.insurerDelayMo} mo`],
                  ["Materials & lab (mature)", `${inp.materialsPct}% of revenue`],
                  ["Clinic lease · staff housing (annual)", `SAR ${f0(inp.clinicRent)}K · SAR ${f0(inp.staffHousing)}K`],

                  ["Total CapEx (incl. derived pre-opening)", `SAR ${f0(totalCapex(inp))}K`],
                  ["Working capital reserve · contingency", `SAR ${f0(inp.capexWorkingCapital)}K · SAR ${f0(inp.capexContingency)}K`],
                  ["Exit multiple · WACC · Zakat", `${inp.exitMultiple}× EBITDA · ${inp.wacc}% · ${inp.zakatPct}%`],
                ].map(([k, v]) => (
                  <tr key={k}><td style={{ ...tLb, color: C.sub, fontSize: 11 }}>{k}</td><td style={{ ...tTd, fontSize: 11 }}>{v}</td></tr>

              Insights10, <i>Saudi Arabia Dental Care Market Analysis 2022–2030</i> · IndustryARC, <i>Dental Clinic Services Market in Saudi Arabia 2024–2030</i> · Council of Health Insurance (CHI), beneficiary statistics 2024–25 · MOH Statistical Yearbook 2023 &amp; PLOS One (2023), national dentist workforce analysis · US-Saudi Business Council, <i>Saudi Healthcare Sector 2025</i> · Royal Commission for Riyadh City / GASTAT population statistics · MDPI IJERPH (2024), GIS analysis of private dental facilities in Riyadh · Saudi Vision 2030 Health Sector Transformation Program.
            </div>
            <div style={{ ...note, marginTop: 14 }}>Prepared as an indicative executive feasibility assessment generated from an interactive financial model. Market figures are drawn from the public sources above and should be re-validated at the time of investment; financial outputs change with the model's assumptions. This document does not constitute investment, legal, tax or regulatory advice.</div>

    /* ---------- main ---------- */
    function App() {
      const [inp, setInp] = useState(BASE_INPUTS);
      const [showStudy, setShowStudy] = useState(false);
      const set = useCallback((k, v) => setInp((p) => ({ ...p, [k]: v })), []);
      const m = useMemo(() => compute(inp), [inp]);

      // sensitivity & break-even: one-way ±20% swings on the drivers that matter, plus two break-even points
      const sens = useMemo(() => {
        const drivers = [
          ["Revenue per chair", "revPerChair"],
          ["Y1 utilization", "rampStart"],
          ["Materials & lab %", "materialsPct"],
          ["Dentist profit share", "profitShare"],
          ["Exit multiple", "exitMultiple"],
        ];
        const rows = drivers.map(([label, k]) => [label, compute({ ...inp, [k]: inp[k] * 0.8 }).npv, compute({ ...inp, [k]: inp[k] * 1.2 }).npv]);
        // break-even revenue per chair: NPV = 0 (bisection; NPV is monotonic in revPerChair)
        let beRev = null;
        let lo = 0, hi = Math.max(100, inp.revPerChair * 2);
        if (compute({ ...inp, revPerChair: lo }).npv < 0 && compute({ ...inp, revPerChair: hi }).npv > 0) {
          for (let k = 0; k < 30; k++) { const mid = (lo + hi) / 2; if (compute({ ...inp, revPerChair: mid }).npv < 0) lo = mid; else hi = mid; }
          beRev = (lo + hi) / 2;
        }
        // lowest Y1 utilization the funding budget survives
        let minUtil = null;
        for (let u = 0; u <= 100; u += 1) { if (compute({ ...inp, rampStart: u }).fundingOk) { minUtil = u; break; } }
        return { rows, beRev, minUtil };
      }, [inp]);

      // active section for the sticky nav (highlights as you scroll)
      const [activeSec, setActiveSec] = useState("summary");
      useEffect(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) setActiveSec(e.target.id); });
        }, { rootMargin: "-140px 0px -66% 0px" });
        NAV_SECTIONS.forEach(([id]) => { const el = document.getElementById(id); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);

      const storage = null; // no Claude storage in standalone mode
      const [saved, setSaved] = useState([]);
      const [scenName, setScenName] = useState("");
      const [toast, setToast] = useState(null);
      const flash = (t) => { setToast(t); setTimeout(() => setToast(null), 2200); };

      const saveScenario = () => {
        const name = scenName.trim();
        if (!name) { flash("Name the scenario first"); return; }
        const id = name.replace(/[\s/\\'"]+/g, "_").slice(0, 60);
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        existing[id] = { name, inputs: inp, ts: Date.now() };
        localStorage.setItem("dental_scenarios", JSON.stringify(existing));
        setScenName(""); flash(`Saved "${name}"`);
        loadList();
      };
      const loadList = useCallback(() => {
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        const out = Object.entries(existing).map(([key, v]) => ({ key, ...v }));
        out.sort((a, b) => (b.ts || 0) - (a.ts || 0));
        setSaved(out);
      }, []);
      useEffect(() => { loadList(); }, [loadList]);
      const loadScenario = (s) => { setInp({ ...BASE_INPUTS, ...s.inputs }); flash(`Loaded "${s.name}"`); };
      const deleteScenario = (s) => {
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        delete existing[s.key];
        localStorage.setItem("dental_scenarios", JSON.stringify(existing));
        flash(`Deleted "${s.name}"`); loadList();
      };

      const chartData = m.years.map((y) => ({ year: y.year, Revenue: Math.round(y.revenue), EBITDA: Math.round(y.ebitda), "Net income": Math.round(y.ni) }));

      // opening & year-1 budget: total cash required to open and operate through M12
      const budget = (() => {
        const preOpen = preOpeningCost(inp);
        const vat = vatOnCapex(inp);
        const rentCheque1 = (inp.clinicRent + inp.staffHousing) * LEASE_ESC[0] * rentUpfrontFactor(inp);
        const insPrem = inp.insuranceCCHI * STAFF_RAMP[0] + (inp.dentistCount * inp.malpracticePerDentist) / 1000;
        const staffOnboard = preOpen - rentCheque1 - insPrem;
        const capexInvest = totalCapex(inp) - preOpen - inp.capexWorkingCapital;
        const opShortfall = Math.max(0, m.peakNeed - preOpen - vat);
        const totalRequired = capexInvest + preOpen + vat + opShortfall;
        const totalBudget = totalCapex(inp);
        const by1 = m.years[0];
        const opexY1 = by1.fixedStaff + by1.share + by1.materials + by1.lease + by1.mkt + by1.other + by1.insUtil + by1.foreign;
        const netRevY1 = by1.revenue - by1.denials;
        return { preOpen, vat, rentCheque1, insPrem, staffOnboard, capexInvest, opShortfall, totalRequired, totalBudget, buffer: totalBudget - totalRequired, opexY1, netRevY1, ebitdaY1: by1.ebitda };
      })();
      const rentChequeLabel = inp.rentTerms === "grace" ? `Rent during fit-out (${inp.fitoutMonths}-month grace — waived)` : inp.rentTerms === "semiannual" ? `Semi-annual rent instalments before opening` : `First annual rent cheque (P${inp.fitoutMonths})`;
      const budgetPie = [
        { name: "Facility fit-out", value: inp.capexFitout },
        { name: "Clinical equipment", value: inp.capexChairs + inp.capexImaging + inp.capexCSSD },
        { name: "IT, furniture & inventory", value: inp.capexIT + inp.capexFurniture + inp.capexInventory },
        { name: "Soft costs & compliance", value: inp.capexLicensing + inp.capexCivilDefence + inp.capexConsultants + inp.capexRecruitment },
        { name: "Contingency", value: inp.capexContingency },
        { name: "Pre-opening expenses", value: budget.preOpen },
        { name: "Working capital reserve", value: inp.capexWorkingCapital },
      ].filter(d => d.value > 0);
      const PIE_COLORS = { "Facility fit-out": "#15263B", "Clinical equipment": "#27384E", "IT, furniture & inventory": "#64707C", "Soft costs & compliance": "#9DAEC0", "Contingency": "#D9B36A", "Pre-opening expenses": "#B0823A", "Working capital reserve": "#2E7D63" };
      const budgetCapexRows = [
        ["Facility fit-out", "capexFitout"], ["Chairs & accessories", "capexChairs"], ["Imaging equipment", "capexImaging"],
        ["Sterilisation / CSSD", "capexCSSD"], ["IT & systems", "capexIT"], ["Furniture & fittings", "capexFurniture"],
        ["Initial inventory", "capexInventory"], ["Licensing, legal & CR", "capexLicensing"], ["Civil Defence", "capexCivilDefence"],
        ["Consultants & PMC", "capexConsultants"], ["Foreign-staff recruitment", "capexRecruitment"], ["Contingency", "capexContingency"],
      ];
      const bRow = { display: "flex", justifyContent: "space-between", padding: "3.5px 0", fontFamily: SANS, fontSize: 12.5, color: C.text };
      const bVal = { fontFamily: MONO, fontSize: 12.5 };
      const bSub = { display: "flex", justifyContent: "space-between", padding: "7px 0 0", marginTop: 6, borderTop: `1px solid ${C.line}`, fontFamily: SANS, fontSize: 12.5, fontWeight: 700, color: C.text };
      const bTitle = { fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.brass, marginBottom: 8 };

      const pnlRows = [
        ["Revenue", "revenue", "head"], ["Claims denied", "denials", "neg"], ["Materials & lab", "materials", "neg"], ["Gross profit", "gp", "sub"],
        ["Fixed staff (incl. dentist base)", "fixedStaff", "neg"], ["Lease & housing", "lease", "neg"],
        ["Marketing", "mkt", "neg"], ["Other OpEx", "other", "neg"], ["Insurance, utilities & waste", "insUtil", "neg"], ["Foreign-labour fees", "foreign", "neg"],
        ["Operating profit b/f share", "preshare", "sub"], ["Dentist profit share", "share", "neg"],
        ["EBITDA", "ebitda", "head"], ["Depreciation", "dep", "neg"], ["Zakat", "zakat", "neg"], ["Net income", "ni", "head"],
        ["Free cash flow", "fcf", "head"],
      ];

      // executive-summary derivations (all from the model — no new math)
      const topRisk = sens.rows.reduce((a, r) => (Math.abs(r[2] - r[1]) > Math.abs(a[2] - a[1]) ? r : a), sens.rows[0]);
      const marginOk = m.y5.ebitdaPct >= 25;
      const rationale = [
        m.cumNI > 0 ? `cumulative income +${f0(m.cumNI)}K` : `cumulative income ${f0(m.cumNI)}K`,
        `${pctf(m.y5.ebitdaPct)} mature EBITDA margin`,
        m.payback ? `${m.payback.toFixed(1)}-yr payback` : `no payback in 5 yrs`,
        m.fundingOk ? `fully funded (+${f0(budget.buffer)}K buffer)` : `underfunded by ${f0(Math.abs(budget.buffer))}K`,
      ].join("  ·  ");
      const thesis = `A ${inp.chairs}-chair Riyadh clinic needing SAR ${f0(budget.totalRequired)}K all-in to open and reach self-funding. At ${inp.revPerChair}K/chair/month it matures to ${pctf(m.y5.ebitdaPct)} EBITDA — ${marginOk ? "above" : "below"} the 25–30% KSA benchmark — returning a ${m.irr == null ? "n/a" : pctf(m.irr * 100)} 5-year IRR and ${f0(m.npv)}K NPV at ${inp.wacc}% WACC. ${m.fundingOk ? "The funding plan covers the launch cash trough" : "The funding plan is short of the launch cash trough"}; the result swings most on ${topRisk[0].toLowerCase()}.`;
      const summaryKpis = [
        ["Capital required", f0(budget.totalRequired), "SAR '000 all-in", C.brass, budget.buffer >= 0 ? `funded · +${f0(budget.buffer)}K buffer` : `SHORT ${f0(Math.abs(budget.buffer))}K`, budget.buffer >= 0 ? C.pos : C.neg],
        ["5-year IRR", m.irr == null ? "n/a" : pctf(m.irr * 100), "incl. exit at " + inp.exitMultiple + "× EBITDA", C.text, null, null],
        ["NPV", f0(m.npv), `@ ${inp.wacc}% WACC, SAR '000`, m.npv < 0 ? C.neg : C.pos, null, null],
        ["Capital payback", m.payback ? m.payback.toFixed(1) + " yrs" : "—", "on free cash flow", C.text, null, null],
      ];
      const outputKpis = [
        ["Year-5 revenue", f0(m.y5.revenue), "SAR '000", C.brass, null, null],
        ["Year-5 EBITDA", f0(m.y5.ebitda), pctf(m.y5.ebitdaPct) + " margin", m.y5.ebitda < 0 ? C.neg : C.brass, marginOk ? "vs 25–30% benchmark ✓" : "below 25% benchmark", marginOk ? C.pos : C.neg],
        ["Cumulative net income", f0(m.cumNI), "Y1–Y5, SAR '000", m.cumNI < 0 ? C.neg : C.pos, null, null],
        ["Dentist pay (Y5)", "SAR " + m.perDentistMo.toFixed(1) + "K", "per dentist / month", m.perDentistMo < 12 ? C.neg : C.text, null, null],
        ["Exit value", f0(m.exitValue), `${inp.exitMultiple}× Y5 EBITDA`, m.exitValue < 0 ? C.neg : C.brass, null, null],
        ["NPV", f0(m.npv), `@ ${inp.wacc}% WACC`, m.npv < 0 ? C.neg : C.pos, null, null],
      ];

      if (showStudy) return (
        <StudyDocument inp={inp} m={m} budget={budget} sens={sens} topRisk={topRisk} chartData={chartData} budgetPie={budgetPie} pieColors={PIE_COLORS} onClose={() => setShowStudy(false)} />
      );

      return (
        <div className="app-shell" style={{ background: C.bone, minHeight: "100vh", fontFamily: SANS, color: C.text }}>
          <div className="sticky-bar" style={{ position: "sticky", top: 0, zIndex: 20, background: C.ink, borderBottom: `1px solid ${C.lineDk}` }}>
            <div style={{ maxWidth: 1180, margin: "0 auto", padding: "14px 22px 0" }}>
              <div className="flex flex-wrap items-center justify-between" style={{ gap: 12 }}>
                <div>
                  <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", color: C.brassLt }}>Dental Clinic · Riyadh — {inp.chairs} Operatories</div>
                  <div style={{ fontFamily: SANS, fontSize: 18, fontWeight: 700, color: C.inv, letterSpacing: "-0.01em" }}>Financial Feasibility Study</div>
                </div>
                <div className="flex items-center" style={{ gap: 16 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.12em", textTransform: "uppercase", color: C.invSub }}>Capital required</div>
                    <div style={{ fontFamily: MONO, fontSize: 24, fontWeight: 700, color: C.brassLt, letterSpacing: "-0.02em", lineHeight: 1 }}>{f0(budget.totalRequired)}</div>
                  </div>
                  <div style={{ textAlign: "right", paddingLeft: 16, borderLeft: `1px solid ${C.lineDk}` }}>
                    <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.12em", textTransform: "uppercase", color: C.invSub }}>Verdict</div>
                    <div style={{ fontFamily: MONO, fontSize: 24, fontWeight: 700, color: m.vColor, letterSpacing: "-0.02em", lineHeight: 1 }}>{m.verdict}</div>
                    {!m.fundingOk && <div style={{ fontFamily: SANS, fontSize: 9.5, fontWeight: 700, color: C.neg, marginTop: 2 }}>· underfunded</div>}
                  </div>
                  <button onClick={() => setShowStudy(true)} className="no-print" style={btn("transparent", C.brassLt, C.lineDk)}><FileText size={14} /> Study</button>
                  <button onClick={() => window.print()} className="no-print" style={btn(C.brass, C.ink)}><Save size={14} /> Export</button>
                </div>
              </div>
              <div className="flex flex-wrap" style={{ gap: 0, marginTop: 10 }}>

            {/* Cash flow statement */}
            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 22 }}>
              <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.line}`, display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Cash Flow · Launch &amp; First Two Years · SAR '000</h3>
                <span style={{ fontFamily: SANS, fontSize: 11, color: C.sub }}>Direct method · actual cheque timing per the selected rent terms · ties to the funding view below</span>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: MONO, fontSize: 12.5 }}>
                  <thead>
                    <tr style={{ background: C.bone }}>
                      <th style={{ padding: "9px 14px", textAlign: "left", fontFamily: SANS, fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: C.sub }}>Line item</th>
                      {[`Pre-Opening (P${inp.fitoutMonths}–P1)`, "Year 1 (M1–M12)", "Year 2 (M13–M24)"].map(h => (
                        <th key={h} style={{ padding: "9px 10px", textAlign: "right", fontFamily: SANS, fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: C.sub }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {m.cashflow.map(([label, vals, kind], ri) => {
                      if (kind === "section") return (
                        <tr key={ri}><td colSpan={4} style={{ padding: "11px 14px 3px", textAlign: "left", fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.09em", textTransform: "uppercase", color: C.brass }}>{label}</td></tr>
                      );
                      const bold = kind === "subtotal" || kind === "total";
                      return (
                        <tr key={ri} style={{ borderTop: bold ? `1px solid ${C.line}` : "none", background: kind === "total" ? C.bone : "transparent" }}>
                          <td style={{ padding: "6px 14px", textAlign: "left", fontFamily: SANS, fontSize: 12.5, color: bold ? C.text : C.sub, fontWeight: bold ? 700 : 400 }}>{label}</td>
                          {vals.map((v, i) => (
                            <td key={i} style={{ padding: "6px 10px", textAlign: "right", fontWeight: bold ? 700 : 400, color: v == null ? C.line : v < 0 ? (bold ? C.neg : C.sub) : (kind === "total" ? C.pos : C.text) }}>
                              {v == null ? "—" : v < 0 ? `(${f0(Math.abs(v))})` : f0(v)}
                            </td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{ padding: "10px 18px 14px", fontFamily: SANS, fontSize: 11, color: C.sub }}>
                Collections are net of denials and shifted by the insurer payment delay · Y2 insurance renewal falls at M24, outside the window · excludes build-out CapEx (funded at launch), maintenance CapEx &amp; Zakat · "lowest cash point" is the funding trough each period, covered by the pre-opening + WC budget ({f0(m.fundingBudget)})
              </div>
            </div>

            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "18px 16px 8px", marginBottom: 22 }}>
              <div className="flex flex-wrap items-start justify-between" style={{ padding: "0 6px 12px", gap: 10 }}>
                <div>
                  <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Funding View · Cash Balance</h3>
                  <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, marginTop: 3 }}>
                    Running cash on hand from fit-out start (P{inp.fitoutMonths}) through Year 2 — the shaded area is your bank balance; its lowest point is the capital you must have in place. Dashed line = pre-opening + WC budget. · SAR '000
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: SANS, fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: C.sub }}>Peak funding need</div>
                  <div style={{ fontFamily: MONO, fontSize: 22, fontWeight: 700, color: m.fundingOk ? C.pos : C.neg, letterSpacing: "-0.02em" }}>
                    {m.peakNeed > 0 ? f0(m.peakNeed) : "0"} <span style={{ fontFamily: SANS, fontSize: 11, fontWeight: 400, color: C.sub }}>{m.peakNeed > 0 ? `in ${m.troughLabel}` : "cash-positive from M1"}</span>
                  </div>
                  <div style={{ fontFamily: SANS, fontSize: 11, color: m.fundingOk ? C.sub : C.neg, marginTop: 2 }}>
                    {m.fundingOk ? `Covered by pre-opening + WC budget (${f0(m.fundingBudget)}) · headroom ${f0(m.fundingBudget - m.peakNeed)}` : `EXCEEDS pre-opening + WC budget (${f0(m.fundingBudget)}) by ${f0(m.peakNeed - m.fundingBudget)} — increase reserve`}
                  </div>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={270}>
                <ComposedChart data={m.monthly} margin={{ top: 14, right: 8, left: 4, bottom: 0 }}>
                  <defs>
                    <linearGradient id="cashFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={C.brass} stopOpacity={0.32} />
                      <stop offset="100%" stopColor={C.brass} stopOpacity={0.04} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid stroke={C.line} vertical={false} />
                  <XAxis dataKey="month" tick={{ fontFamily: MONO, fontSize: 10, fill: C.sub }} axisLine={{ stroke: C.line }} tickLine={false} interval={1} />
                  <YAxis tick={{ fontFamily: MONO, fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} tickFormatter={(v) => f0(v)} />
                  <Tooltip formatter={(v) => f0(v)} labelFormatter={(l) => `Cash balance · ${l}`} contentStyle={{ fontFamily: MONO, fontSize: 12, borderRadius: 8, border: `1px solid ${C.line}` }} />
                  <ReferenceLine y={0} stroke={C.sub} />
                  <ReferenceLine y={-m.fundingBudget} stroke={C.neg} strokeDasharray="5 4" label={{ value: `Funding budget (${f0(m.fundingBudget)})`, position: "insideBottomRight", fontFamily: SANS, fontSize: 10.5, fill: C.neg }} />
                  <ReferenceLine x="M1" stroke={C.lineDk} strokeDasharray="3 3" label={{ value: "Opening", position: "insideTopLeft", fontFamily: SANS, fontSize: 10, fill: C.sub }} />
                  <Area type="monotone" dataKey="Cumulative" stroke={C.brass} strokeWidth={2.5} fill="url(#cashFill)" baseValue={0} dot={false} activeDot={{ r: 4, fill: C.brass }} />
                  {m.peakNeed > 0 && <ReferenceDot x={m.troughLabel} y={-m.peakNeed} r={4.5} fill={C.neg} stroke="#fff" strokeWidth={1.5} label={{ value: `trough ${f0(-m.peakNeed)}`, position: "bottom", fontFamily: MONO, fontSize: 10, fontWeight: 700, fill: C.neg }} />}
                </ComposedChart>
              </ResponsiveContainer>
            </div>

            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "18px 16px 8px", marginBottom: 22 }}>
              <div className="flex flex-wrap items-start justify-between" style={{ padding: "0 6px 12px", gap: 10 }}>
                <div>
                  <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Operating Cash Flow · Monthly</h3>
                  <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, marginTop: 3 }}>
                    Each bar is that month's net operating cash (Years 1–2, pre-opening excluded). Red bars are when big cheques fall due — annual rent (M7 &amp; M19) and insurance renewal (M12). · SAR '000
                  </div>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={220}>
                <ComposedChart data={m.monthlyOp} margin={{ top: 6, right: 8, left: 4, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} vertical={false} />
                  <XAxis dataKey="month" tick={{ fontFamily: MONO, fontSize: 10, fill: C.sub }} axisLine={{ stroke: C.line }} tickLine={false} interval={1} />
                  <YAxis tick={{ fontFamily: MONO, fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} tickFormatter={(v) => f0(v)} />
                  <Tooltip formatter={(v) => f0(v)} labelFormatter={(l) => `Net cash · ${l}`} contentStyle={{ fontFamily: MONO, fontSize: 12, borderRadius: 8, border: `1px solid ${C.line}` }} />
                  <ReferenceLine y={0} stroke={C.sub} />
                  <Bar dataKey="Net cash" radius={[3, 3, 0, 0]} maxBarSize={22}>
                    {m.monthlyOp.map((d, i) => <Cell key={i} fill={d["Net cash"] < 0 ? C.neg : C.pos} />)}
                  </Bar>
                </ComposedChart>
              </ResponsiveContainer>
            </div>

            {/* Financials */}
            <div id="financials" style={{ scrollMarginTop: 150 }}>
              <SectionHeader eyebrow="05 · Financials" title="Five-Year P&L" sub="Full income statement at the current assumptions. Figures in SAR '000." />
            </div>
            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 28 }} className="print-section print-break">
              <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.line}` }}>
                <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Five-year P&amp;L · SAR '000</h3>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: MONO, fontSize: 12.5 }}>
                  <thead>
                    <tr>
                      <th style={{ ...th, textAlign: "left", fontFamily: SANS }}>Line item</th>
                      {m.years.map((y) => <th key={y.year} style={th}>{y.year}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {pnlRows.map(([label, key, kind]) => (
                      <tr key={key} style={{ background: kind === "head" ? "#F3EFE6" : "transparent" }}>
                        <td style={{ ...td, textAlign: "left", fontFamily: SANS, fontWeight: kind === "head" ? 700 : kind === "sub" ? 600 : 400, color: kind === "neg" ? C.sub : C.text }}>{label}</td>
                        {m.years.map((y) => {
                          const v = y[key];
                          const neg = kind === "neg";
                          const isLoss = (key === "ebitda" || key === "ni" || key === "preshare") && v < 0;
                          return <td key={y.year} style={{ ...td, fontWeight: kind === "head" ? 700 : 400, color: isLoss ? C.neg : (neg ? C.sub : C.text) }}>{neg ? `(${f0(Math.abs(v))})` : f0(v)}</td>;
                        })}
                      </tr>
                    ))}
                    <tr>
                      <td style={{ ...td, textAlign: "left", fontFamily: SANS, fontStyle: "italic", color: C.sub }}>EBITDA margin</td>
                      {m.years.map((y) => <td key={y.year} style={{ ...td, color: y.ebitda < 0 ? C.neg : C.brass }}>{pctf(y.ebitdaPct)}</td>)}
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div className="print-only print-break" style={{ marginTop: 20, marginBottom: 18 }}>
              <SectionHeader eyebrow="Appendix" title="Assumptions Used" />
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: MONO, fontSize: 11.5 }}>
                <tbody>
                  {[
                    ["Revenue per chair / month", inp.revPerChair + "K SAR"],
                    ["Operatories (chairs)", inp.chairs],
                    ["Dentists · base salary · profit share", `${inp.dentistCount} · ${f0(inp.dentistBase)} SAR/mo · ${inp.profitShare}%`],
                    ["Y1 utilization · ramp growth", `${inp.rampStart}% · ${inp.rampGrowth}%/yr`],
                    ["Insured share · rejection · delay", `${inp.insuredPct}% · ${inp.rejectionPct}% · ${inp.insurerDelayMo} mo`],
                    ["Materials & lab (mature)", inp.materialsPct + "%"],
                    ["Clinic lease · staff housing", `${f0(inp.clinicRent)}K · ${f0(inp.staffHousing)}K`],
                    ["Marketing · Other OpEx (mature)", `${f0(inp.marketing)}K · ${f0(inp.otherOpex)}K`],
                    ["Expats (derived) · levy · iqama", `${expatCount(inp)} · ${inp.levyPerMonth}/mo · ${inp.iqamaPerYear}/yr`],
                    ["Fit-out duration · rent terms", `${inp.fitoutMonths} mo · ${inp.rentTerms}`],
                    ["Working capital reserve", f0(inp.capexWorkingCapital) + "K"],
                    ["Total CapEx (incl. pre-opening)", f0(totalCapex(inp)) + "K"],
                    ["Exit multiple · WACC · Zakat", `${inp.exitMultiple}× · ${inp.wacc}% · ${inp.zakatPct}%`],
                  ].map(([k, v]) => (
                    <tr key={k} style={{ borderBottom: `1px solid ${C.line}` }}>
                      <td style={{ padding: "5px 10px", textAlign: "left", fontFamily: SANS, color: C.sub }}>{k}</td>
                      <td style={{ padding: "5px 10px", textAlign: "right", color: C.text }}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="print-section" style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, lineHeight: 1.6, paddingBottom: 30 }}>
              Indicative model for planning, not investment or legal advice. Dentist pay = base salary + {inp.profitShare}% of operating profit (pooled, paid only when profit is positive). Benchmarks: Riyadh rents & 2025 rent freeze (SAT Real Estate, Knight Frank); salaries (PayScale, SalaryExpert, Paylab); Saudization 55% from 27 Jan 2026 & SAR 9,000 floor (Arab News, HRSD); expat levy SAR 800/mo + iqama/permit fees (MHRSD 2026 schedules). Validate all figures with local quotations before committing capital.
            </div>
          </div>

          {toast && (
            <div style={{ position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", background: C.ink, color: C.inv, fontFamily: SANS, fontSize: 13, fontWeight: 500, padding: "10px 18px", borderRadius: 8, border: `1px solid ${C.brass}`, zIndex: 50, boxShadow: "0 6px 24px rgba(0,0,0,0.25)" }}>{toast}</div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
