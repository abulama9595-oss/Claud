<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental Clinic · Financial Model</title>
  <script src="vendor/react.js"></script>
  <script src="vendor/react-dom.js"></script>
  <script src="vendor/babel.js"></script>
  <script src="vendor/prop-types.js"></script>
  <script src="vendor/recharts.js"></script>
  <!-- shared financial engine (must load before the Babel app script) -->
  <script src="engine.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F1EDE4; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .items-baseline { align-items: baseline; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .grid { display: grid; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; background: #DBD4C5; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; margin-top: -5px; background: var(--accent, #B0823A); cursor: pointer; }
    html { scroll-behavior: smooth; }
    .navlink { cursor: pointer; transition: color .15s; }
    .navlink:hover { color: #D9B36A !important; }
    .print-only { display: none; }
    @media print {
      @page { margin: 12mm; }
      body { background: #fff !important; }
      .no-print { display: none !important; }
      input[type=range] { display: none !important; }
      .print-only { display: block !important; }
      .print-section { break-inside: avoid; }
      .print-break { break-before: page; }
      .sticky-bar { position: static !important; background: #fff !important; border-bottom: 1px solid #DBD4C5 !important; }
      .sticky-bar * { color: #1B2733 !important; }
      .app-shell { background: #fff !important; }
      .study-shell { background: #fff !important; padding: 0 !important; }
      .page { break-after: page; border: none !important; box-shadow: none !important; margin: 0 auto !important; border-radius: 0 !important; min-height: auto !important; padding: 6mm 2mm !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { ComposedChart, BarChart, LineChart, Bar, Line, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ReferenceLine, ReferenceDot, ReferenceArea, PieChart, Pie, Legend } = window.Recharts;

    /* ---------- presentation components ---------- */
    function SectionHeader({ eyebrow, title, sub, meta }) {
      return (
        <div className="flex items-baseline justify-between" style={{ flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
          <div>
            {eyebrow && <div style={{ fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: C.brass, marginBottom: 4 }}>{eyebrow}</div>}
            <h2 style={{ fontFamily: SANS, fontSize: 19, fontWeight: 700, color: C.text, letterSpacing: "-0.01em", margin: 0 }}>{title}</h2>
            {sub && <div style={{ fontFamily: SANS, fontSize: 12.5, color: C.sub, marginTop: 4, maxWidth: 760 }}>{sub}</div>}
          </div>
          {meta && <div style={{ textAlign: "right" }}>{meta}</div>}
        </div>
      );
    }
    function KpiCard({ label, value, sub, accent, flag, flagColor }) {
      return (
        <div className="print-section" style={{ background: C.paper, border: `1px solid ${C.line}`, borderTop: `3px solid ${accent || C.brass}`, borderRadius: 9, padding: "13px 15px" }}>
          <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.06em", textTransform: "uppercase", color: C.sub, marginBottom: 5 }}>{label}</div>
          <div style={{ fontFamily: MONO, fontSize: 25, fontWeight: 700, color: accent || C.text, letterSpacing: "-0.03em", lineHeight: 1 }}>{value}</div>
          {sub && <div style={{ fontFamily: SANS, fontSize: 11, color: C.sub, marginTop: 5 }}>{sub}</div>}
          {flag && <div style={{ fontFamily: SANS, fontSize: 11, fontWeight: 600, color: flagColor || C.pos, marginTop: 3 }}>{flag}</div>}
        </div>
      );
    }
    const NAV_SECTIONS = [
      ["summary", "Summary"], ["outputs", "Key Outputs"], ["assumptions", "Assumptions"],
      ["funding", "Investment & Cash"], ["financials", "Financials"],
    ];

    /* ---------- executive feasibility study document ---------- */
    // Big-4-style advisory report, generated live from the model state. Market figures are
    // research-based (sources in Appendix); all financials are pulled from compute()/budget/sens.
    function StudyDocument({ inp, m, budget, sens, topRisk, chartData, budgetPie, pieColors, onClose }) {
      const TOTAL_PAGES = 10;
      const today = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
      const F = inp.fitoutMonths;
      const visitsDay = (m.revPerChairFull || 0) * 1000 / 500 / 26; // derived per-chair yield drives the visit estimate
      const visitsYear = Math.round(inp.chairs * visitsDay * 26 * 12);
      const expat = expatCount(inp);
      const staffTotal = totalDentists(inp) + Math.ceil(inp.chairs * inp.nursesPerChair) + inp.medicalSupportCount + inp.janitorCount + inp.driverCount + inp.generalStaffCount + 1;
      const saudiPct = staffTotal > 0 ? Math.max(0, Math.round(100 * (staffTotal - expat) / staffTotal)) : 0;
      const selfFund = (m.monthly.find(d => d.month.startsWith("M") && d["Cumulative"] >= 0) || {}).month;
      const cushion = sens.beRev != null && inp.revPerChair > 0 ? Math.round(100 * (inp.revPerChair - sens.beRev) / inp.revPerChair) : null;
      const rampY2 = Math.min(100, inp.rampStart * (1 + inp.rampGrowth / 100));
      const mktData = [{ y: "2022", v: 287 }, { y: "2024", v: 334 }, { y: "2026", v: 389 }, { y: "2028", v: 452 }, { y: "2030", v: 490 }];

      const page = { background: "#FFFFFF", border: `1px solid ${C.line}`, borderRadius: 6, maxWidth: 880, margin: "0 auto 26px", padding: "48px 56px 30px", boxShadow: "0 2px 16px rgba(14,26,43,0.07)", fontFamily: SANS, color: C.text, minHeight: 980, display: "flex", flexDirection: "column" };
      const secT = { fontFamily: SANS, fontSize: 17.5, fontWeight: 700, letterSpacing: "-0.01em", borderBottom: `2px solid ${C.brass}`, paddingBottom: 7, margin: "0 0 16px" };
      const subT = { fontFamily: SANS, fontSize: 12.5, fontWeight: 700, color: C.text, margin: "14px 0 6px" };
      const para = { fontSize: 12.3, lineHeight: 1.75, color: C.text, margin: "0 0 10px", textAlign: "justify" };
      const bull = { fontSize: 12.3, lineHeight: 1.7, color: C.text, margin: "0 0 5px 16px" };
      const tTh = { padding: "7px 10px", textAlign: "right", fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "#fff", background: C.ink2 };
      const tTd = { padding: "6px 10px", textAlign: "right", fontFamily: MONO, fontSize: 11.8, borderBottom: `1px solid ${C.line}`, whiteSpace: "nowrap" };
      const tLb = { ...tTd, textAlign: "left", fontFamily: SANS };
      const note = { fontSize: 10.5, color: C.sub, lineHeight: 1.6, marginTop: 8 };

      function Pg({ n, children }) {
        return (
          <div className="page print-section" style={page}>
            <div style={{ flex: 1 }}>{children}</div>
            <div className="flex justify-between" style={{ borderTop: `1px solid ${C.line}`, marginTop: 26, paddingTop: 8, fontFamily: SANS, fontSize: 9.5, color: C.sub, letterSpacing: "0.06em" }}>
              <span>PRIVATE &amp; CONFIDENTIAL · DENTAL CLINIC FEASIBILITY STUDY — RIYADH</span>
              <span>PAGE {n} OF {TOTAL_PAGES}</span>
            </div>
          </div>
        );
      }
      function Metric({ k, v, s }) {
        return (
          <div style={{ flex: "1 1 150px", border: `1px solid ${C.line}`, borderTop: `3px solid ${C.brass}`, borderRadius: 6, padding: "10px 13px" }}>
            <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.07em", textTransform: "uppercase", color: C.sub }}>{k}</div>
            <div style={{ fontFamily: MONO, fontSize: 19, fontWeight: 700, color: C.text, marginTop: 3 }}>{v}</div>
            {s && <div style={{ fontFamily: SANS, fontSize: 9.5, color: C.sub, marginTop: 2 }}>{s}</div>}
          </div>
        );
      }

      return (
        <div className="study-shell" style={{ background: C.bone, minHeight: "100vh", padding: "70px 18px 40px" }}>
          <div className="no-print" style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 40, background: C.ink, borderBottom: `1px solid ${C.lineDk}` }}>
            <div style={{ maxWidth: 880, margin: "0 auto", padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
              <button onClick={onClose} style={btn("transparent", C.brassLt, C.lineDk)}><RotateCcw size={14} /> Back to model</button>
              <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.invSub }}>Executive feasibility study · figures update live with the model</div>
              <button onClick={() => window.print()} style={btn(C.brass, C.ink)}><Save size={14} /> Print / PDF</button>
            </div>
          </div>

          {/* ——— Page 1 · Cover ——— */}
          <Pg n={1}>
            <div style={{ paddingTop: 60 }}>
              <div style={{ fontFamily: SANS, fontSize: 11, letterSpacing: "0.22em", textTransform: "uppercase", color: C.brass, fontWeight: 700 }}>Private &amp; Confidential · Draft for Discussion</div>
              <h1 style={{ fontFamily: SANS, fontSize: 31, fontWeight: 700, letterSpacing: "-0.015em", margin: "16px 0 8px", lineHeight: 1.25 }}>Feasibility Study:<br />Establishment of a {inp.chairs}-Chair Dental Clinic in Riyadh</h1>
              <div style={{ fontFamily: SANS, fontSize: 14, color: C.sub, marginBottom: 34 }}>Kingdom of Saudi Arabia · North Riyadh growth corridor · {today}</div>
              <div className="flex flex-wrap" style={{ gap: 12, marginBottom: 38 }}>
                <Metric k="Verdict" v={m.verdict} s={(sens.minUtil != null && inp.rampStart - sens.minUtil < 10) ? "⚠ thin funding cushion" : undefined} />
                <Metric k="Funding to raise" v={`SAR ${f0(budget.totalRaise)}K`} s={`all-in · incl. ${f0(budget.minCash)}K min-cash`} />
                <Metric k="5-year IRR" v={m.irr == null ? "n/a" : pctf(m.irr * 100)} s={`incl. exit at ${inp.exitMultiple}× EBITDA`} />
                <Metric k="NPV" v={`SAR ${f0(m.npv)}K`} s={`@ ${inp.wacc}% WACC`} />
              </div>
              <div style={{ fontFamily: SANS, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.brass, marginBottom: 8 }}>Contents</div>
              {["Executive Summary", "Market & Industry Analysis", "Location Assessment", "Business Model & Operating Plan", "Financial Projections", "Capital Requirements & Funding", "Risk Assessment & Sensitivity", "Implementation Roadmap", "Conclusion & Appendices"].map((s, i) => (
                <div key={s} className="flex justify-between" style={{ fontFamily: SANS, fontSize: 12, color: C.text, padding: "4px 0", borderBottom: `1px dotted ${C.line}`, maxWidth: 460 }}>
                  <span>{i + 1}.&nbsp;&nbsp;{s}</span><span style={{ fontFamily: MONO, color: C.sub }}>{i + 2}</span>
                </div>
              ))}
              <div style={{ ...note, marginTop: 30 }}>This document is generated directly from the interactive financial model; every figure reflects the assumption set in force at the time of viewing. It follows the structure of an executive advisory feasibility report and is intended for preliminary investment discussion, not as a substitute for site-level due diligence, legal, tax or regulatory advice.</div>
            </div>
          </Pg>

          {/* ——— Page 2 · Executive Summary ——— */}
          <Pg n={2}>
            <h2 style={secT}>1. Executive Summary</h2>
            <p style={para}>This study assesses the commercial and financial feasibility of establishing a {inp.chairs}-operatory private dental clinic in the northern growth corridor of Riyadh, Kingdom of Saudi Arabia. The assessment integrates a market review, a location screening, a five-year financial model with monthly cash simulation of the launch period, and a quantified risk analysis. All figures are stated in SAR '000 unless noted otherwise.</p>
            <p style={para}>The clinic requires total funding of <b>SAR {f0(budget.totalRequired)}K</b>, comprising SAR {f0(budget.capexInvest)}K of capital expenditure, SAR {f0(budget.launchLiquidity)}K of launch liquidity (pre-opening cash, recoverable VAT and the operating ramp to self-funding{selfFund ? `, achieved in ${selfFund}` : ""}), and a SAR {f0(budget.minCash)}K minimum-cash reserve ({inp.minCashMonths} months of operating cost). At a planned production of SAR {inp.revPerChair}K per full-time dentist per month (a derived chair yield of SAR {f0(m.revPerChairFull)}K/chair) — equivalent to {visitsDay.toFixed(1)} patient visits per chair per day at an average ticket of SAR 500 — the clinic matures to revenue of SAR {f0(m.y5.revenue)}K with an EBITDA margin of {pctf(m.y5.ebitdaPct)} by Year 5, {m.y5.ebitdaPct >= 25 ? "within or above" : "below"} the 25–30% range observed for well-run Saudi dental groups.</p>
            <p style={para}>On these assumptions the project returns a five-year IRR of <b>{m.irr == null ? "n/a" : pctf(m.irr * 100)}</b> (including a terminal sale at {inp.exitMultiple}× Year-5 EBITDA) and a net present value of <b>SAR {f0(m.npv)}K</b> at a {inp.wacc}% discount rate, with capital payback in {m.payback ? m.payback.toFixed(1) : "—"} years on free cash flow. Cumulative net income over the five-year horizon is SAR {f0(m.cumNI)}K after Zakat. The funding plan {m.fundingOk ? `covers the peak cash requirement of SAR ${f0(m.peakNeed)}K (${m.troughLabel}) with headroom of SAR ${f0(m.fundingBudget - m.peakNeed)}K` : `is short of the peak cash requirement of SAR ${f0(m.peakNeed)}K (${m.troughLabel}) by SAR ${f0(m.peakNeed - m.fundingBudget)}K`}.</p>
            <div style={subT}>Key indicators</div>
            <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 12 }}>
              <thead><tr><th style={{ ...tTh, textAlign: "left" }}>Indicator</th><th style={tTh}>Value</th><th style={{ ...tTh, textAlign: "left" }}>Indicator</th><th style={tTh}>Value</th></tr></thead>
              <tbody>
                <tr><td style={tLb}>Funding to raise (all-in)</td><td style={tTd}>{f0(budget.totalRaise)}</td><td style={tLb}>Year-5 revenue</td><td style={tTd}>{f0(m.y5.revenue)}</td></tr>
                <tr><td style={tLb}>Min-cash reserve</td><td style={tTd}>{f0(budget.minCash)} ({inp.minCashMonths} mo)</td><td style={tLb}>Year-5 EBITDA (margin)</td><td style={tTd}>{f0(m.y5.ebitda)} ({pctf(m.y5.ebitdaPct)})</td></tr>
                <tr><td style={tLb}>5-year IRR (incl. exit)</td><td style={tTd}>{m.irr == null ? "n/a" : pctf(m.irr * 100)}</td><td style={tLb}>Year-5 net income</td><td style={tTd}>{f0(m.y5.ni)}</td></tr>
                <tr><td style={tLb}>NPV @ {inp.wacc}% WACC</td><td style={tTd}>{f0(m.npv)}</td><td style={tLb}>Cumulative net income Y1–Y5</td><td style={tTd}>{f0(m.cumNI)}</td></tr>
                <tr><td style={tLb}>Payback (free cash flow)</td><td style={tTd}>{m.payback ? m.payback.toFixed(1) + " yrs" : "—"}</td><td style={tLb}>Exit value ({inp.exitMultiple}× Y5 EBITDA)</td><td style={tTd}>{f0(m.exitValue)}</td></tr>
                <tr><td style={tLb}>Peak funding need</td><td style={tTd}>{f0(m.peakNeed)} ({m.troughLabel})</td><td style={tLb}>Break-even / dentist (incl. {inp.wacc}% return) · opex-only / chair</td><td style={tTd}>{sens.beRev == null ? "—" : f0(sens.beRev) + "K"}{m.opBreakEvenRev != null ? ` · ${f0(m.opBreakEvenRev)}K` : ""}</td></tr>
              </tbody>
            </table>
            <div style={subT}>Recommendation</div>
            <p style={para}>{m.verdict === "STRONG"
              ? `The project is assessed as financially attractive. We recommend proceeding to site-level due diligence and lease negotiation, conditional on (i) third-party validation of the SAR ${inp.revPerChair}K per-chair revenue assumption — the single largest value driver, with NPV moving SAR ${f0(Math.abs(topRisk[2] - topRisk[1]))}K across a ±20% range — (ii) securing the full SAR ${f0(budget.totalRequired)}K funding envelope before committing to the lease, and (iii) early initiation of insurer empanelment and SCFHS credentialing to protect the opening date.`
              : m.verdict === "VIABLE"
              ? `The project is assessed as viable but with limited margin for error. We recommend strengthening the funding buffer and re-testing the revenue assumption with primary market evidence before committing capital.`
              : `On the current assumption set the project does not meet investment thresholds. We recommend revisiting the revenue, capacity and cost structure before proceeding.`}</p>
          </Pg>

          {/* ——— Page 3 · Market & Industry ——— */}
          <Pg n={3}>
            <h2 style={secT}>2. Market &amp; Industry Analysis</h2>
            <div style={subT}>2.1 Macro and policy environment</div>
            <p style={para}>Saudi Arabia's Vision 2030 Health Sector Transformation Program is re-shaping healthcare delivery, with a stated objective of raising the private sector's share of healthcare provision to approximately 65% by 2030. The privately insured base reached roughly 13 million beneficiaries under the Council of Health Insurance's mandatory employment-linked scheme, underpinning private outpatient demand. Riyadh is the principal beneficiary of this expansion: the city holds about 7.5 million residents, the wider province about 9 million (≈27% of the Kingdom), with official projections of 12.5 million by 2040, while the capital's bed density of ~1.7 per 1,000 population remains below the national (1.9) and global (2.9) averages — evidence of structural healthcare under-supply relative to population growth.</p>
            <div style={subT}>2.2 Dental services market</div>
            <p style={para}>Independent estimates place the Saudi dental care market at approximately USD 287 million in 2022, growing toward USD ~490 million by 2030 (≈7.9% CAGR); broader definitions of dental clinic services put the 2030 figure higher still. The supply side is expanding but remains thin by developed-market standards: the Kingdom's dentist workforce reached ~25,970 practitioners in 2023 (7.7 per 10,000 population), of whom roughly 70% practise in the private sector, and the Saudization share of dentists rose from 40% to 54% between 2019 and 2023 — directly relevant to this project's staffing and quota compliance strategy.</p>
            <div className="flex" style={{ gap: 22, alignItems: "flex-start", marginTop: 6 }}>
              <div style={{ flex: "1 1 50%" }}>
                <div style={{ fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.brass, marginBottom: 6 }}>KSA dental care market · USD M</div>
                <ResponsiveContainer width="100%" height={190}>
                  <ComposedChart data={mktData} margin={{ top: 6, right: 6, left: -14, bottom: 0 }}>
                    <CartesianGrid stroke={C.line} vertical={false} />
                    <XAxis dataKey="y" tick={{ fontFamily: MONO, fontSize: 10.5, fill: C.sub }} axisLine={{ stroke: C.line }} tickLine={false} />
                    <YAxis tick={{ fontFamily: MONO, fontSize: 10.5, fill: C.sub }} axisLine={false} tickLine={false} />
                    <Bar dataKey="v" radius={[3, 3, 0, 0]} maxBarSize={34}>{mktData.map((d, i) => <Cell key={i} fill={i >= 3 ? C.brassLt : C.ink2} />)}</Bar>
                  </ComposedChart>
                </ResponsiveContainer>
                <div style={note}>2026–2030 extrapolated at ~7.9% CAGR (Insights10, 2022 base). Lighter bars = forecast.</div>
              </div>
              <div style={{ flex: "1 1 46%" }}>
                <div style={{ fontFamily: SANS, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.brass, marginBottom: 6 }}>Demand cross-check vs model</div>
                <div style={bull}>• Model requires <b>{visitsDay.toFixed(1)} visits/chair/day</b> at maturity (SAR 500 avg ticket) — ≈{f0(visitsYear)} visits/yr across {inp.chairs} chairs.</div>
                <div style={bull}>• A 3 km North-Riyadh catchment of ~150–200k residents at typical utilisation of 0.5–1.0 dental visits per capita per year implies 75–200k addressable visits — the model captures a minority share.</div>
                <div style={bull}>• {inp.insuredPct}% of revenue is assumed insured; the 13M-beneficiary CHI base and mandatory employer coverage support this mix in formal-employment districts.</div>
                <div style={bull}>• Pricing benchmarked to mid-premium private positioning; no government (MOH) volume assumed.</div>
              </div>
            </div>
            <div style={note}>Sources: Insights10 (2022); IndustryARC (2024); Council of Health Insurance announcements (2024–25); MOH Statistical Yearbook 2023 / PLOS One national workforce analysis (2023); US-Saudi Business Council healthcare sector review (2025); GASTAT / RCRC population statistics. Full list in Section 9.</div>
          </Pg>

          {/* ——— Page 4 · Location ——— */}
          <Pg n={4}>
            <h2 style={secT}>3. Location Assessment</h2>
            <p style={para}>The recommended siting is the <b>Al Malqa–Hittin corridor of North Riyadh</b>, on or near the King Fahd Road / Northern Ring Road axis. The corridor combines the city's strongest household-income demographics, sustained residential expansion toward the north, daytime professional traffic from the King Abdullah Financial District (KAFD), and arterial accessibility — while spatial analyses of private dental facilities in Riyadh show clinic supply still concentrated in the older central districts, leaving the northern corridor comparatively under-served per resident.</p>
            <svg viewBox="0 0 720 430" style={{ width: "100%", height: "auto", background: "#F6F1E7", borderRadius: 8, border: `1px solid ${C.line}` }}>
              <path d="M150,355 C118,298 128,238 168,198 C198,158 258,118 328,103 C398,88 468,98 518,128 C568,158 598,208 603,263 C608,318 578,366 518,392 C448,420 228,420 150,355 Z" fill="#EDE5D3" stroke="#DBD4C5" strokeWidth="2" />
              <path d="M205,135 C185,195 175,255 190,325" fill="none" stroke="#C2D0BC" strokeWidth="11" opacity="0.7" />
              <ellipse cx="385" cy="262" rx="172" ry="118" fill="none" stroke="#9DAEC0" strokeWidth="2.5" />
              <line x1="385" y1="112" x2="385" y2="402" stroke="#64707C" strokeWidth="3.5" />
              <path d="M218,182 C298,148 475,148 555,182" fill="none" stroke="#64707C" strokeWidth="3" />
              <line x1="188" y1="298" x2="598" y2="298" stroke="#64707C" strokeWidth="3" />
              <text x="392" y="135" fontFamily={SANS} fontSize="9" fill="#64707C" transform="rotate(90 392 135)">King Fahd Rd</text>
              <text x="455" y="158" fontFamily={SANS} fontSize="9" fill="#64707C">Northern Ring Rd</text>
              <text x="540" y="292" fontFamily={SANS} fontSize="9" fill="#64707C">Makkah Rd</text>
              <text x="208" y="142" fontFamily={SANS} fontSize="10.5" fill="#64707C" fontStyle="italic">Diriyah</text>
              <text x="556" y="100" fontFamily={SANS} fontSize="10.5" fill="#64707C">✈ King Khalid Int'l</text>
              <text x="402" y="222" fontFamily={SANS} fontSize="10.5" fill="#1B2733" fontWeight="600">KAFD</text>
              <text x="398" y="262" fontFamily={SANS} fontSize="10.5" fill="#1B2733">Olaya CBD</text>
              <text x="345" y="240" fontFamily={SANS} fontSize="10.5" fill="#1B2733">Al Nakheel</text>
              <text x="430" y="152" fontFamily={SANS} fontSize="10.5" fill="#1B2733">Al Yasmin</text>
              <text x="395" y="350" fontFamily={SANS} fontSize="10.5" fill="#64707C">Ad Dirah (old city)</text>
              <circle cx="318" cy="170" r="48" fill="rgba(176,130,58,0.10)" stroke="#B0823A" strokeWidth="1.8" strokeDasharray="6 4" />
              <circle cx="318" cy="170" r="7" fill="#B0823A" stroke="#FFFFFF" strokeWidth="2.5" />
              <text x="246" y="150" fontFamily={SANS} fontSize="11.5" fill="#1B2733" fontWeight="700">Al Malqa</text>

          <Pg n={5}>
            <h2 style={secT}>4. Business Model &amp; Operating Plan</h2>
            <p style={para}>The clinic operates {inp.chairs} operatories on a rostered dentist-day model — chairs are open {inp.clinicDays} days/week (one full shift per day) and covered by {inp.dentistCount} salaried dentist{inp.dentistCount === 1 ? "" : "s"} at {inp.dentistDays} days/week each{inp.seniorCount > 0 ? ` plus ${inp.seniorCount} senior dentist${inp.seniorCount === 1 ? "" : "s"} on production-only terms at ${inp.seniorDays} days/week each` : ""}, a roster coverage of {pctf(m.coverage * 100)} — offering general and family dentistry with specialty services (orthodontics, prosthodontics, paediatric, implantology) under a single-shift, 26-day operating month. Salaried dentists combine a base of SAR {f0(inp.dentistBase)}/month with {inp.profitShare}% of the profit on their own production — their collected billings less their salary and their share of clinic costs (mature earnings ≈SAR {m.perDentistMo.toFixed(1)}K/month){inp.seniorCount > 0 ? `; senior dentists draw no salary and earn ${inp.seniorProdPct}% ${SENIOR_BASIS_LABEL[inp.seniorPayBasis]} (≈SAR ${m.perSeniorMo.toFixed(1)}K/month at maturity, each bringing a personal book of SAR ${f0(inp.seniorRevPerChair)}K/month regardless of days attended, vs SAR ${f0(inp.revPerChair)}K produced by a full-time salaried dentist)` : ""} — aligning clinical earnings with clinic performance and limiting fixed-cost exposure during the ramp.</p>
            <div style={subT}>4.1 Organisation &amp; staffing ({staffTotal} FTE at maturity)</div>

              <thead><tr><th style={{ ...tTh, textAlign: "left" }}>Role</th><th style={tTh}>Headcount</th><th style={tTh}>Avg salary (SAR/mo)</th><th style={{ ...tTh, textAlign: "left" }}>Notes</th></tr></thead>
              <tbody>
                <tr><td style={tLb}>Dentists (salaried)</td><td style={tTd}>{inp.dentistCount}</td><td style={tTd}>{f0(inp.dentistBase)}</td><td style={tLb}>+ {inp.profitShare}% profit share on own production; ≥SAR 9,000 GOSI floor for Saudization</td></tr>
                {inp.seniorCount > 0 && <tr><td style={tLb}>Senior dentists (production)</td><td style={tTd}>{inp.seniorCount}</td><td style={tTd}>—</td><td style={tLb}>No salary; {inp.seniorProdPct}% {SENIOR_BASIS_LABEL[inp.seniorPayBasis]}, {inp.seniorDays} days/week each; covered by clinic malpractice policy</td></tr>}
                <tr><td style={tLb}>Chairside staff</td><td style={tTd}>{Math.ceil(inp.chairs * inp.nursesPerChair)}</td><td style={tTd}>{f0(inp.chairsideSalary)}</td><td style={tLb}>{inp.nursesPerChair}/chair — nurses &amp; assistants</td></tr>
                <tr><td style={tLb}>Medical support (CSSD / X-ray)</td><td style={tTd}>{inp.medicalSupportCount}</td><td style={tTd}>{f0(inp.medicalSupportSalary)}</td><td style={tLb}>Sterilisation &amp; imaging technicians</td></tr>

                <tr><td style={tLb}>Janitorial &amp; drivers</td><td style={tTd}>{inp.janitorCount + inp.driverCount}</td><td style={tTd}>{f0(inp.janitorSalary)} / {f0(inp.driverSalary)}</td><td style={tLb}>Hygiene &amp; logistics support</td></tr>

            </table>
            <div style={bull}>• Expatriate headcount (derived): <b>{expat}</b> — drives work-permit levies (SAR {inp.levyPerMonth}/mo) and iqama fees (SAR {f0(inp.iqamaPerYear)}/yr); indicative Saudization ≈{saudiPct}% of total FTE.</div>
            <div style={bull}>• Payroll burden: GOSI &amp; benefits load of {inp.gosiPct}% on the fixed staff base; mandatory CCHI health insurance (SAR {f0(inp.insuranceCCHI)}K p.a.) and malpractice cover (SAR {f0(inp.malpracticePerDentist)}/dentist/yr).</div>
            <div style={subT}>4.2 Revenue model &amp; payor mix</div>
            <div style={bull}>• Production-led model: SAR {inp.revPerChair}K per full-time dentist per month, chair-capped to a derived SAR {f0(m.revPerChairFull)}K/chair at maturity = {visitsDay.toFixed(1)} visits/chair/day at SAR 500 average ticket ({visitsDay > 15 ? "above" : "within"} the ~15/day single-shift ceiling).</div>

            <div style={bull}>• Regulatory pathway: MOH/SEHA facility licence, Civil Defence approval, SFDA-compliant radiology, SCFHS credentialing of clinicians, CHI insurer empanelment from opening.</div>

    /* ---------- in-page assistant: explains study concepts & live numbers (runs locally, no network) ---------- */
    function buildKB({ m, inp, sens, budget }) {
      const k = (n) => f0(n) + "K";                 // SAR'000
      const pc = (n, d = 0) => pctf(n, d);
      const irrTxt = m.irr == null ? "n/a" : pc(m.irr * 100, 1);
      const top = sens.rows.reduce((a, r) => (Math.abs(r[2] - r[1]) > Math.abs(a[2] - a[1]) ? r : a), sens.rows[0]);
      const topSwing = k(Math.abs(top[2] - top[1]));
      const marginOk = m.y5.ebitdaPct >= 25;
      const cushion = sens.beRev != null && inp.revPerChair > 0 ? (100 * (inp.revPerChair - sens.beRev) / inp.revPerChair).toFixed(0) : null;
      return [
        { id: "verdict", label: "verdict", kw: ["verdict", "strong", "viable", "marginal", "recommend", "should i invest", "is it worth", "conclusion", "bottom line", "go ahead", "good investment"],
          answer: `The model's verdict is ${m.verdict}.\n\nIt's graded on three things from your scenario: cumulative 5-yr net income (${k(m.cumNI)}), the mature EBITDA margin (${pc(m.y5.ebitdaPct)}, vs a 25–30% benchmark), and payback (${m.payback ? m.payback.toFixed(1) + " yrs" : "none within 5 yrs"}).\n• STRONG — profitable, margin ≥ 25% and payback ≤ 4.5 yrs.\n• VIABLE — profitable but missing one of those.\n• MARGINAL — doesn't clear cumulative profit.` },
        { id: "funding", label: "funding to raise", kw: ["funding", "raise", "capital", "how much", "total cost", "investment needed", "money needed", "upfront"],
          answer: `Total funding to raise is ${k(budget.totalRaise)}, in three parts:\n• CapEx investment ${k(budget.capexInvest)} — fit-out, chairs, imaging, IT, licensing, contingency.\n• Launch liquidity ${k(budget.launchLiquidity)} — covers the cash trough during the patient ramp.\n• Min-cash reserve ${k(budget.minCash)} — ${inp.minCashMonths} months of operating cost kept on hand.\n\nThis is the all-in capital to open and reach self-funding.` },
        { id: "launch", label: "launch liquidity", kw: ["launch liquidity", "liquidity", "trough", "burn", "pre-opening", "preopening", "ramp cash", "working capital"],
          answer: `Your launch liquidity is ${k(budget.launchLiquidity)} — the cash sized to cover the deepest point of the cash curve before the clinic funds itself.\n\nIt absorbs the pre-opening burn (rent, payroll, insurance and VAT before any revenue) plus the operating shortfall while patient volume ramps. The trough hits around ${m.troughLabel} at about ${k(m.peakNeed)}. It's one of the three parts of the funding to raise.` },
        { id: "mincash", label: "min-cash reserve", kw: ["min-cash", "min cash", "minimum cash", "reserve", "cash buffer", "buffer", "why did min", "marketing go up", "mincashmonths"],
          answer: `Your minimum-cash reserve is ${k(budget.minCash)} — a buffer kept on hand after opening, set at ${inp.minCashMonths} months of operating cost (monthly opex ≈ ${k(m.monthlyOpex)}).\n\nBecause it's a multiple of monthly opex, anything that raises running costs pushes the reserve up too. Marketing (now ${k(inp.marketing)}/yr) is part of opex — increase it and monthly opex rises, so ${inp.minCashMonths}× that figure rises with it. Same for rent, staff or other opex.` },
        { id: "moic", label: "moic", kw: ["moic", "equity multiple", "multiple of money", "money back", "cash returned", "x return", "times my money"],
          answer: `Equity multiple (MOIC) is ${m.moic.toFixed(2)}×.\n\nIt's total cash returned ÷ capital invested: five years of free cash flow plus the exit value (${k(m.exitValue)} at ${inp.exitMultiple}× EBITDA), divided by the ${k(budget.totalRaise)} raised. 1.0× means you just got your money back; ${m.moic.toFixed(2)}× means about ${m.moic.toFixed(2)} riyals back for every riyal in.` },
        { id: "irr", label: "irr", kw: ["irr", "internal rate", "annual return", "rate of return", "return %"],
          answer: `The 5-year IRR is ${irrTxt}.\n\nIt's the annualised return that makes all the project cash flows — the raise out, free cash flow in, and the year-5 exit — net to zero. Compare it to your ${inp.wacc}% cost of capital (WACC): above WACC creates value, below destroys it.` },
        { id: "npv", label: "npv", kw: ["npv", "net present value", "present value", "discount", "wacc", "hurdle", "cost of capital"],
          answer: `NPV is ${k(m.npv)}, discounted at your ${inp.wacc}% WACC.\n\nIt's today's value of all future free cash flows plus the exit, minus the capital raised. Positive means the project earns more than the ${inp.wacc}% hurdle (WACC = your blended cost of capital); negative means less.` },
        { id: "payback", label: "payback", kw: ["payback", "pay back", "break even time", "how long to recover", "recover capital", "years to recoup"],
          answer: `Capital payback is ${m.payback ? m.payback.toFixed(1) + " years" : "not reached within 5 years"}.\n\nIt's the point at which cumulative free cash flow first covers the ${k(budget.totalRaise)} you put in.${m.payback && m.payback <= 4.5 ? " Under 4.5 yrs, which supports a STRONG verdict." : ""}` },
        { id: "ebitda", label: "ebitda", kw: ["ebitda", "margin", "operating profit", "profitability", "benchmark"],
          answer: `Year-5 EBITDA is ${k(m.y5.ebitda)}, a ${pc(m.y5.ebitdaPct)} margin — ${marginOk ? "at or above" : "below"} the 25–30% KSA benchmark for a mature clinic.\n\nEBITDA is earnings before interest, zakat and depreciation — the cash-generating profit of operations, before financing and accounting charges.` },
        { id: "breakeven", label: "break-even", kw: ["break-even", "break even", "breakeven", "minimum revenue", "lowest revenue"],
          answer: `Two break-evens:\n• Value break-even — revenue per full-time dentist where NPV = 0: ${sens.beRev == null ? "below the tested range (profitable across it)" : k(sens.beRev) + "/dentist/mo"}. Your plan is ${inp.revPerChair}K${cushion != null ? `, a ${cushion}% cushion` : ""}.\n• Operating break-even — revenue/chair to cover opex (excl. dentist share): ${m.opBreakEvenRev == null ? "—" : k(m.opBreakEvenRev) + "/chair/mo"}. That's the base each dentist earns above.` },
        { id: "share", label: "profit share", kw: ["profit share", "dentist pay", "dentist salary", "per dentist", "dentist compensation", "how are dentists paid", "pooled"],
          answer: inp.seniorCount > 0
            ? `Two tiers. ${inp.dentistCount} salaried dentists earn a base salary plus ${inp.profitShare}% of the profit on their OWN production (their billings less their salary and their share of clinic costs) — about SAR ${m.perDentistMo.toFixed(1)}K each per month by year 5 (Y5 salaried share pool ${k(m.y5.share)}; the margin the clinic keeps on senior books goes to the owner, not this pool). ${inp.seniorCount} senior dentists draw no salary and earn ${inp.seniorProdPct}% ${SENIOR_BASIS_LABEL[inp.seniorPayBasis]} — about SAR ${m.perSeniorMo.toFixed(1)}K each per month at maturity (Y5 total ${k(m.y5.seniorPay)}). Each senior brings a personal book of SAR ${f0(inp.seniorRevPerChair)}K/month regardless of days worked; salaried dentists produce SAR ${f0(inp.revPerChair)}K full-time, scaled by days.\n\nSeniors cover ${inp.seniorDays} days/week each; roster coverage is ${pc(m.coverage * 100)} of chair-days.`
            : `Each salaried dentist earns a base salary plus ${inp.profitShare}% of the profit on their own production — their collected billings less their salary and their share of clinic costs (paid only when that profit is positive).\n\nAcross ${inp.dentistCount} dentists that's about SAR ${m.perDentistMo.toFixed(1)}K per dentist per month by year 5. The year-5 salaried share is ${k(m.y5.share)}.` },
        { id: "materials", label: "materials", kw: ["materials", "lab", "consumables", "cost of goods", "supplies"],
          answer: `Materials & lab cost runs at ${pc(inp.materialsPct)} of revenue${inp.materialsY1Premium ? ` (with a Y1 premium of ${inp.materialsY1Premium} pts)` : ""} — consumables, lab work and implant components.\n\nIt's one of the larger sensitivity levers: a couple of points moves EBITDA noticeably.` },
        { id: "ramp", label: "utilization", kw: ["utilization", "utilisation", "ramp", "occupancy", "chairs full", "capacity", "patient volume"],
          answer: `Utilization is how full the chairs are vs capacity. The plan starts year 1 at ${inp.rampStart}% and climbs toward 100% by year 5 as the patient base builds.\n\nLower Y1 utilization deepens the cash trough — here the raise survives down to ${sens.minUtil == null ? "—" : sens.minUtil + "%"} Y1 utilization before funding falls short (plan is ${inp.rampStart}%).` },
        { id: "exit", label: "exit", kw: ["exit", "sale", "exit multiple", "terminal value", "selling the clinic", "exit value"],
          answer: `Exit value is ${k(m.exitValue)}, modelled as ${inp.exitMultiple}× year-5 EBITDA (${k(m.y5.ebitda)}).\n\nIt's a year-5 sale assumption and drives a big share of both IRR and MOIC — the second-most-tested lever after revenue.` },
        { id: "sensitivity", label: "sensitivity", kw: ["sensitivity", "biggest risk", "biggest driver", "what matters most", "tornado", "most sensitive", "riskiest", "swing"],
          answer: `The result swings most on ${top[0].toLowerCase()}: a ±20% move changes NPV by about ${topSwing}. That's the assumption to validate first.\n\nThe model stress-tests revenue/dentist, Y1 utilization, materials %, profit share and the exit multiple.` },
        { id: "trough", label: "cash trough", kw: ["cash trough", "lowest cash", "peak need", "peak funding", "deepest", "cash low point", "run out of cash"],
          answer: `The cash-flow trough — the lowest the balance gets before the clinic self-funds — is about ${k(m.peakNeed)} around ${m.troughLabel}.\n\nThat's exactly what the launch liquidity (${k(budget.launchLiquidity)}) is sized to cover.` },
        { id: "saudization", label: "saudization", kw: ["saudization", "saudisation", "gosi", "quota", "nitaqat", "saudi dentist", "9000", "local hire"],
          answer: m.saudization

            : `Saudization looks OK: your SAR ${inp.dentistBase.toLocaleString()} base is at/above the SAR 9,000 GOSI floor that lets Saudi dentists count toward the mandatory 55% dental quota (effective 27 Jan 2026).` },

      ];
    }

        for (const e of KB) {

          for (const w of e.kw) if (s.includes(w)) sc += 1;
          if (sc > bestScore) { bestScore = sc; best = e; }

              <div style={{ flex: 1, overflowY: "auto", padding: 14, background: C.bone }}>
                {msgs.map((msg, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
                    <div style={{ maxWidth: "86%", whiteSpace: "pre-wrap", lineHeight: 1.5, fontSize: 12.5, padding: "9px 12px", borderRadius: 12, background: msg.role === "user" ? C.ink2 : C.paper, color: msg.role === "user" ? C.inv : C.text, border: msg.role === "user" ? "none" : `1px solid ${C.line}`, borderBottomRightRadius: msg.role === "user" ? 3 : 12, borderBottomLeftRadius: msg.role === "user" ? 12 : 3 }}>{msg.text}</div>

    /* ---------- main ---------- */
    function App() {
      const [inp, setInp] = useState(BASE_INPUTS);
      const [showStudy, setShowStudy] = useState(false);
      const set = useCallback((k, v) => setInp((p) => ({ ...p, [k]: v })), []);
      const m = useMemo(() => compute(inp), [inp]);

      // sensitivity & break-even: one-way ±20% swings on the drivers that matter, plus two break-even points
      const sens = useMemo(() => {
        const drivers = [
          ["Revenue / dentist (FTE)", "revPerChair"],
          ["Y1 utilization", "rampStart"],
          ["Materials & lab %", "materialsPct"],
          ["Salaried profit share", "profitShare"],
          ["Exit multiple", "exitMultiple"],
        ];
        const rows = drivers.map(([label, k]) => [label, compute({ ...inp, [k]: inp[k] * 0.8 }).npv, compute({ ...inp, [k]: inp[k] * 1.2 }).npv]);
        // break-even revenue per chair: NPV = 0 (bisection; NPV is monotonic in revPerChair)
        let beRev = null;
        let lo = 0, hi = Math.max(100, inp.revPerChair * 2);
        if (compute({ ...inp, revPerChair: lo }).npv < 0 && compute({ ...inp, revPerChair: hi }).npv > 0) {
          for (let k = 0; k < 30; k++) { const mid = (lo + hi) / 2; if (compute({ ...inp, revPerChair: mid }).npv < 0) lo = mid; else hi = mid; }
          beRev = (lo + hi) / 2;
        }
        // lowest Y1 utilization the funding budget survives
        // downside resilience: hold the capital actually raised fixed, then find the lowest Y1 utilization whose (deeper) cash trough still fits within it
        let minUtil = null;
        const baseFunding = compute(inp).fundingBudget;
        for (let u = 0; u <= 100; u += 1) { if (compute({ ...inp, rampStart: u }).peakNeed <= baseFunding) { minUtil = u; break; } }
        return { rows, beRev, minUtil };
      }, [inp]);

      // active section for the sticky nav (highlights as you scroll)
      const [activeSec, setActiveSec] = useState("summary");
      useEffect(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) setActiveSec(e.target.id); });
        }, { rootMargin: "-140px 0px -66% 0px" });
        NAV_SECTIONS.forEach(([id]) => { const el = document.getElementById(id); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);

      const storage = null; // no Claude storage in standalone mode
      const [saved, setSaved] = useState([]);
      const [scenName, setScenName] = useState("");
      const [toast, setToast] = useState(null);
      const flash = (t) => { setToast(t); setTimeout(() => setToast(null), 2200); };

      const saveScenario = () => {
        const name = scenName.trim();
        if (!name) { flash("Name the scenario first"); return; }
        const id = name.replace(/[\s/\\'"]+/g, "_").slice(0, 60);
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        existing[id] = { name, inputs: inp, ts: Date.now() };
        localStorage.setItem("dental_scenarios", JSON.stringify(existing));
        setScenName(""); flash(`Saved "${name}"`);
        loadList();
      };
      const loadList = useCallback(() => {
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        const out = Object.entries(existing).map(([key, v]) => ({ key, ...v }));
        out.sort((a, b) => (b.ts || 0) - (a.ts || 0));
        setSaved(out);
      }, []);
      useEffect(() => { loadList(); }, [loadList]);
      const loadScenario = (s) => { setInp({ ...BASE_INPUTS, ...s.inputs }); flash(`Loaded "${s.name}"`); };
      const deleteScenario = (s) => {
        const existing = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        delete existing[s.key];
        localStorage.setItem("dental_scenarios", JSON.stringify(existing));
        flash(`Deleted "${s.name}"`); loadList();
      };
      const fileRef = React.useRef(null);
      const exportScenarios = () => {
        const scenarios = JSON.parse(localStorage.getItem("dental_scenarios") || "{}");
        const bundle = { type: "dental-clinic-scenarios", version: 1, exportedAt: new Date().toISOString(), current: inp, scenarios };
        const url = URL.createObjectURL(new Blob([JSON.stringify(bundle, null, 2)], { type: "application/json" }));
        const a = document.createElement("a");
        a.href = url; a.download = `dental-scenarios-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000);
        flash(`Exported ${Object.keys(scenarios).length} saved + current model`);
      };
      const importScenarios = (e) => {
        const file = e.target.files && e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            let incoming = {}, loadedCurrent = false;
            if (data && data.scenarios && typeof data.scenarios === "object") {
              incoming = data.scenarios;
              if (data.current && typeof data.current === "object") { setInp({ ...BASE_INPUTS, ...data.current }); loadedCurrent = true; }
            } else if (data && data.inputs && typeof data.inputs === "object") {
              const id = (data.name || "imported").replace(/[\s/\\'"]+/g, "_").slice(0, 60);
              incoming = { [id]: { name: data.name || "Imported", inputs: data.inputs, ts: data.ts || Date.now() } };
            } else if (data && typeof data === "object" && ("revPerChair" in data || "chairs" in data)) {
              setInp({ ...BASE_INPUTS, ...data }); loadedCurrent = true;
            } else if (data && typeof data === "object") { incoming = data; }
            const merged = { ...JSON.parse(localStorage.getItem("dental_scenarios") || "{}"), ...incoming };
            localStorage.setItem("dental_scenarios", JSON.stringify(merged)); loadList();
            const n = Object.keys(incoming).length;
            flash(n > 0 ? `Imported ${n} scenario${n === 1 ? "" : "s"}${loadedCurrent ? " + model" : ""}` : (loadedCurrent ? "Loaded model from file" : "Nothing to import"));
          } catch (err) { flash("Import failed — not a valid scenarios file"); }
        };
        reader.readAsText(file); e.target.value = "";
      };

      const chartData = m.years.map((y) => ({ year: y.year, Revenue: Math.round(y.revenue), EBITDA: Math.round(y.ebitda), "Net income": Math.round(y.ni) }));

      // opening & year-1 budget: total cash required to open and operate through M12
      const budget = (() => {
        const preOpen = preOpeningCost(inp);
        const vat = vatOnCapex(inp);
        const rentCheque1 = (inp.clinicRent + inp.staffHousing) * LEASE_ESC[0] * rentUpfrontFactor(inp);
        const insPrem = inp.insuranceCCHI * STAFF_RAMP[0] + (totalDentists(inp) * inp.malpracticePerDentist) / 1000;
        const staffOnboard = preOpen - rentCheque1 - insPrem;
        const capexInvest = m.investCapex;                         // all CapEx lines (WC reserve no longer guessed)
        const opShortfall = Math.max(0, m.peakNeed - preOpen - vat);
        // sources & uses building blocks
        const hardAssets = hardCapex(inp);
        const softCosts = (inp.capexLicensing || 0) + (inp.capexConsultants || 0);
        const inventory = inp.capexInventory || 0;
        const contingency = inp.capexContingency || 0;
        const launchLiquidity = m.launchLiquidity;                  // = peak cumulative cash deficit
        const minCash = m.minCashReserve;                           // deliberate liquidity policy cushion
        const wcDerived = launchLiquidity + minCash;                // derived working capital (replaces the old guess)
        const totalRaise = m.totalRaise;
        const totalRequired = totalRaise, totalBudget = totalRaise, buffer = minCash;
        const by1 = m.years[0];
        const opCostsY1 = by1.fixedStaff + by1.materials + by1.lease + by1.mkt + by1.other + by1.insUtil + by1.foreign; // operating costs only (excl. practitioner variable pay)
        const opexY1 = opCostsY1 + by1.share + by1.seniorPay; // total Y1 cash costs = operating costs + salaried share + senior production pay
        const netRevY1 = by1.revenue - by1.denials;
        return { preOpen, vat, rentCheque1, insPrem, staffOnboard, capexInvest, opShortfall, hardAssets, softCosts, inventory, contingency, launchLiquidity, minCash, wcDerived, totalRaise, totalRequired, totalBudget, buffer, opCostsY1, opexY1, netRevY1, ebitdaY1: by1.ebitda };
      })();
      const rentChequeLabel = inp.rentTerms === "grace" ? `Rent during fit-out (${inp.fitoutMonths}-month grace — waived)` : inp.rentTerms === "semiannual" ? `Semi-annual rent instalments before opening` : `First annual rent cheque (P${inp.fitoutMonths})`;
      const budgetPie = [

        { name: "Soft costs & compliance", value: inp.capexLicensing + inp.capexCivilDefence + inp.capexConsultants },

      const budgetCapexRows = [
        ["Facility fit-out", "capexFitout"], ["Chairs & accessories", "capexChairs"], ["Imaging equipment", "capexImaging"],
        ["Sterilisation / CSSD", "capexCSSD"], ["IT & systems", "capexIT"], ["Furniture & fittings", "capexFurniture"],
        ["Initial inventory", "capexInventory"], ["Licensing, legal & CR", "capexLicensing"], ["Civil Defence", "capexCivilDefence"],

      ];
      const bRow = { display: "flex", justifyContent: "space-between", padding: "3.5px 0", fontFamily: SANS, fontSize: 12.5, color: C.text };

        ["Fixed staff (incl. dentist base)", "fixedStaff", "neg"], ["Lease & housing", "lease", "neg"],
        ["Marketing", "mkt", "neg"], ["Other OpEx", "other", "neg"], ["Insurance, utilities & waste", "insUtil", "neg"], ["Foreign-labour fees", "foreign", "neg"],

        ["EBITDA", "ebitda", "head"], ["Depreciation", "dep", "neg"],

      })();

      // executive-summary derivations (all from the model — no new math)
      const topRisk = sens.rows.reduce((a, r) => (Math.abs(r[2] - r[1]) > Math.abs(a[2] - a[1]) ? r : a), sens.rows[0]);
      const marginOk = m.y5.ebitdaPct >= 25;
      const rationale = [
        m.cumNI > 0 ? `cumulative income +${f0(m.cumNI)}K` : `cumulative income ${f0(m.cumNI)}K`,
        `${pctf(m.y5.ebitdaPct)} mature EBITDA margin`,
        m.payback ? `${m.payback.toFixed(1)}-yr payback` : `no payback in 5 yrs`,

      const thesis = `A ${inp.chairs}-chair Riyadh clinic needing SAR ${f0(budget.totalRaise)}K all-in to open and reach self-funding. At ${inp.revPerChair}K/dentist/month (${f0(m.revPerChairFull)}K/chair derived) it matures to ${pctf(m.y5.ebitdaPct)} EBITDA — ${marginOk ? "above" : "below"} the 25–30% KSA benchmark — returning a ${m.irr == null ? "n/a" : pctf(m.irr * 100)} 5-year IRR and ${f0(m.npv)}K NPV at ${inp.wacc}% WACC. ${m.fundingOk ? "The funding plan covers the launch cash trough" : "The funding plan is short of the launch cash trough"}; the result swings most on ${topRisk[0].toLowerCase()}.`;
      const summaryKpis = [
        ["Funding to raise", f0(budget.totalRaise), "SAR '000 · all-in capital", C.brass, `incl. ${f0(budget.minCash)}K min-cash reserve`, C.pos],
        ["5-year IRR", m.irr == null ? "n/a" : pctf(m.irr * 100), "incl. exit at " + inp.exitMultiple + "× EBITDA", C.text, null, null],
        ["Equity multiple", m.moic.toFixed(2) + "×", "cash returned ÷ invested (MOIC)", C.pos, null, null],
        ["NPV", f0(m.npv), `@ ${inp.wacc}% WACC, SAR '000`, m.npv < 0 ? C.neg : C.pos, null, null],
        ["Capital payback", m.payback ? m.payback.toFixed(1) + " yrs" : "—", "on free cash flow", C.text, null, null],
      ];
      const outputKpis = [
        ["Year-5 revenue", f0(m.y5.revenue), "SAR '000", C.brass, null, null],
        ["Year-5 EBITDA", f0(m.y5.ebitda), pctf(m.y5.ebitdaPct) + " margin", m.y5.ebitda < 0 ? C.neg : C.brass, marginOk ? "vs 25–30% benchmark ✓" : "below 25% benchmark", marginOk ? C.pos : C.neg],
        ["Cumulative net income", f0(m.cumNI), "Y1–Y5, SAR '000", m.cumNI < 0 ? C.neg : C.pos, null, null],
        ["Dentist pay (Y5)", "SAR " + m.perDentistMo.toFixed(1) + "K", inp.seniorCount > 0 ? `salaried / mo · seniors earn ${m.perSeniorMo.toFixed(1)}K` : "per dentist / month", m.perDentistMo < 12 ? C.neg : C.text, null, null],
        ["Exit value", f0(m.exitValue), `${inp.exitMultiple}× Y5 EBITDA`, m.exitValue < 0 ? C.neg : C.brass, null, null],
        ["NPV", f0(m.npv), `@ ${inp.wacc}% WACC`, m.npv < 0 ? C.neg : C.pos, null, null],

      // —— data for the new charts/panels ——
      const marginData = m.years.map(y => ({ year: y.year, "Gross %": +y.gpPct.toFixed(1), "EBITDA %": +y.ebitdaPct.toFixed(1), "Net %": +y.niPct.toFixed(1) }));
      const DONUT_COLORS = { "Materials & lab": "#15263B", "Fixed staff": "#27384E", "Dentist share": "#B4452F", "Lease & housing": "#64707C", "Other opex": "#9DAEC0", "EBITDA (margin)": "#2E7D63" };
      const costDonut = (y) => [{ name: "Materials & lab", value: Math.round(y.materials) }, { name: "Fixed staff", value: Math.round(y.fixedStaff) }, { name: "Dentist share", value: Math.round(y.share + y.seniorPay) }, { name: "Lease & housing", value: Math.round(y.lease) }, { name: "Other opex", value: Math.round(y.mkt + y.other + y.insUtil + y.foreign) }, { name: "EBITDA (margin)", value: Math.round(Math.max(0, y.ebitda)) }].filter(d => d.value > 0);
      const tornado = tornadoData(inp);
      const compareRows = [{ name: "Current", inputs: inp }, ...saved.map(s => ({ name: s.name, inputs: { ...BASE_INPUTS, ...s.inputs } }))].map(s => { const x = compute(s.inputs); return { name: s.name, raise: x.totalRaise, irr: x.irr, npv: x.npv, pay: x.payback, ebitda: x.y5.ebitdaPct, moic: x.moic, be: x.opBreakEvenRev }; });
      const [mc, setMc] = useState(null);
      const [mcRunning, setMcRunning] = useState(false);
      const runMc = () => { setMcRunning(true); setTimeout(() => { setMc(monteCarlo(inp, 2500)); setMcRunning(false); }, 20); };

      if (showStudy) return (
        <StudyDocument inp={inp} m={m} budget={budget} sens={sens} topRisk={topRisk} chartData={chartData} budgetPie={budgetPie} pieColors={PIE_COLORS} onClose={() => setShowStudy(false)} />
      );

      return (
        <div className="app-shell" style={{ background: C.bone, minHeight: "100vh", fontFamily: SANS, color: C.text }}>
          <div className="sticky-bar" style={{ position: "sticky", top: 0, zIndex: 20, background: C.ink, borderBottom: `1px solid ${C.lineDk}` }}>
            <div style={{ maxWidth: 1180, margin: "0 auto", padding: "14px 22px 0" }}>
              <div className="flex flex-wrap items-center justify-between" style={{ gap: 12 }}>
                <div>
                  <div style={{ fontFamily: SANS, fontSize: 10.5, letterSpacing: "0.18em", textTransform: "uppercase", color: C.brassLt }}>Dental Clinic · Riyadh — {inp.chairs} Operatories</div>
                  <div style={{ fontFamily: SANS, fontSize: 18, fontWeight: 700, color: C.inv, letterSpacing: "-0.01em" }}>Financial Feasibility Study</div>
                </div>
                <div className="flex items-center" style={{ gap: 16 }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.12em", textTransform: "uppercase", color: C.invSub }}>Funding to raise</div>
                    <div style={{ fontFamily: MONO, fontSize: 24, fontWeight: 700, color: C.brassLt, letterSpacing: "-0.02em", lineHeight: 1 }}>{f0(budget.totalRequired)}</div>
                  </div>
                  <div style={{ textAlign: "right", paddingLeft: 16, borderLeft: `1px solid ${C.lineDk}` }}>
                    <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.12em", textTransform: "uppercase", color: C.invSub }}>Verdict</div>
                    <div style={{ fontFamily: MONO, fontSize: 24, fontWeight: 700, color: m.vColor, letterSpacing: "-0.02em", lineHeight: 1 }}>{m.verdict}</div>
                    {(sens.minUtil != null && inp.rampStart - sens.minUtil < 10) && <div style={{ fontFamily: SANS, fontSize: 9.5, fontWeight: 700, color: C.neg, marginTop: 2 }}>· thin cushion</div>}
                  </div>
                  <button onClick={() => setShowStudy(true)} className="no-print" style={btn("transparent", C.brassLt, C.lineDk)}><FileText size={14} /> Study</button>
                  <button onClick={() => window.print()} className="no-print" style={btn(C.brass, C.ink)}><Save size={14} /> Export</button>
                </div>
              </div>
              <div className="flex flex-wrap" style={{ gap: 0, marginTop: 10 }}>
                {[
                  ["Net income · Y5", f0(m.y5.ni), m.y5.ni < 0 ? C.neg : C.pos],
                  ["Cum. net income", f0(m.cumNI), m.cumNI < 0 ? C.neg : C.pos],
                  ["5-yr IRR", m.irr == null ? "n/a" : pctf(m.irr * 100), C.inv],
                  ["Payback", m.payback ? m.payback.toFixed(1) + " yr" : "—", C.inv],
                  ["Y5 EBITDA margin", pctf(m.y5.ebitdaPct), m.y5.ebitdaPct >= 25 ? C.brassLt : C.neg],
                  ["Min-cash reserve", f0(budget.minCash), C.pos],
                ].map(([l, v, col]) => (
                  <div key={l} style={{ flex: "1 1 110px", minWidth: 100, padding: "4px 14px 8px", borderLeft: `2px solid ${col}` }}>
                    <div style={{ fontFamily: SANS, fontSize: 9.5, letterSpacing: "0.06em", textTransform: "uppercase", color: C.invSub }}>{l}</div>
                    <div style={{ fontFamily: MONO, fontSize: 16, fontWeight: 600, color: col, letterSpacing: "-0.02em" }}>{v}</div>
                  </div>
                ))}
              </div>
              <div className="flex flex-wrap no-print" style={{ gap: 18, borderTop: `1px solid ${C.lineDk}`, marginTop: 10, padding: "9px 0" }}>
                {NAV_SECTIONS.map(([id, lbl]) => (
                  <a key={id} href={`#${id}`} className="navlink" style={{ fontFamily: SANS, fontSize: 12, fontWeight: activeSec === id ? 700 : 500, letterSpacing: "0.02em", color: activeSec === id ? C.brassLt : C.invSub, textDecoration: "none", borderBottom: activeSec === id ? `2px solid ${C.brass}` : "2px solid transparent", paddingBottom: 2 }}>{lbl}</a>
                ))}
              </div>
            </div>
          </div>

          {m.saudization && (
            <div style={{ background: "#3A1E16", borderBottom: `1px solid #5A2E20` }}>
              <div style={{ maxWidth: 1180, margin: "0 auto", padding: "10px 22px", display: "flex", gap: 10, alignItems: "flex-start" }}>
                <AlertTriangle size={18} color={C.brassLt} style={{ flexShrink: 0, marginTop: 1 }} />
                <div style={{ fontFamily: SANS, fontSize: 12.5, color: "#F0D9C8", lineHeight: 1.5 }}>
                  <b style={{ color: C.brassLt }}>Saudization flag:</b> at a SAR {inp.dentistBase.toLocaleString()} registered base, Saudi dentists fall below the SAR 9,000 GOSI threshold required to count toward the mandatory 55% dental Saudization quota (effective 27 Jan 2026). Register Saudi dentists at ≥ SAR 9,000 base — about SAR 252K/year more.
                </div>

          )}

          <div style={{ maxWidth: 1180, margin: "0 auto", padding: "22px" }}>

            {/* Executive Summary */}

            </div>
            <div className="print-section" style={{ background: C.paper, border: `1px solid ${C.line}`, borderLeft: `5px solid ${m.vColor}`, borderRadius: 10, padding: "16px 20px", marginBottom: 14 }}>
              <div className="flex flex-wrap items-center" style={{ gap: 14, marginBottom: 8 }}>
                <span style={{ fontFamily: MONO, fontSize: 30, fontWeight: 700, color: m.vColor, letterSpacing: "-0.02em", lineHeight: 1 }}>{m.verdict}</span>
                {(sens.minUtil != null && inp.rampStart - sens.minUtil < 10) && <span style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, color: C.neg, border: `1px solid ${C.neg}`, borderRadius: 4, padding: "2px 7px" }}>THIN CUSHION · the raise only survives a Y1 utilisation fall to {sens.minUtil}%</span>}

              <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit,minmax(210px,1fr))", gap: 18 }}>
                <div>
                  <div style={{ fontFamily: SANS, fontSize: 10.5, textTransform: "uppercase", letterSpacing: "0.06em", color: C.sub, marginBottom: 3 }}>Most sensitive driver</div>
                  <div style={{ fontFamily: SANS, fontSize: 14.5, fontWeight: 700, color: C.text }}>{topRisk[0]}</div>
                  <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, marginTop: 2 }}>NPV swings {f0(Math.abs(topRisk[2] - topRisk[1]))}K across a ±20% move — validate this first.</div>
                </div>
                <div>

                      const bold = kind === "subtotal" || kind === "total";
                      return (
                        <tr key={ri} style={{ borderTop: bold ? `1px solid ${C.line}` : "none", background: kind === "total" ? C.bone : "transparent" }}>
                          <td style={{ padding: "6px 14px", textAlign: "left", fontFamily: SANS, fontSize: 12.5, color: bold ? C.text : C.sub, fontWeight: bold ? 700 : 400 }}>{label}</td>
                          {vals.map((v, i) => (
                            <td key={i} style={{ padding: "6px 10px", textAlign: "right", fontWeight: bold ? 700 : 400, color: v == null ? C.line : v < 0 ? (bold ? C.neg : C.sub) : (kind === "total" ? C.pos : C.text) }}>
                              {v == null ? "—" : v < 0 ? `(${f0(Math.abs(v))})` : f0(v)}
                            </td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{ padding: "10px 18px 14px", fontFamily: SANS, fontSize: 11, color: C.sub }}>
                Collections are net of denials and shifted by the insurer payment delay · Y2 insurance renewal falls at M24, outside the window · excludes build-out CapEx (funded at launch), maintenance CapEx &amp; Zakat · "lowest cash point" is the funding trough each period, covered by the launch-liquidity + min-cash budget ({f0(m.fundingBudget)})
              </div>
            </div>

            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "18px 16px 8px", marginBottom: 22 }}>
              <div className="flex flex-wrap items-start justify-between" style={{ padding: "0 6px 12px", gap: 10 }}>
                <div>
                  <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Funding View · Cash Balance</h3>
                  <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, marginTop: 3 }}>
                    Running cash on hand from fit-out start (P{inp.fitoutMonths}) through Year 2 — the shaded area is your bank balance; its lowest point is the capital you must have in place. Dashed line = launch-liquidity + min-cash budget. · SAR '000
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: SANS, fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: C.sub }}>Peak funding need</div>
                  <div style={{ fontFamily: MONO, fontSize: 22, fontWeight: 700, color: (sens.minUtil != null && inp.rampStart - sens.minUtil < 10) ? C.neg : C.pos, letterSpacing: "-0.02em" }}>
                    {m.peakNeed > 0 ? f0(m.peakNeed) : "0"} <span style={{ fontFamily: SANS, fontSize: 11, fontWeight: 400, color: C.sub }}>{m.peakNeed > 0 ? `in ${m.troughLabel}` : "cash-positive from M1"}</span>
                  </div>
                  <div style={{ fontFamily: SANS, fontSize: 11, color: (sens.minUtil != null && inp.rampStart - sens.minUtil < 10) ? C.neg : C.sub, marginTop: 2 }}>
                    {`Budget ${f0(m.fundingBudget)} = ${f0(m.peakNeed)} trough + ${f0(m.minCashReserve)} min-cash${sens.minUtil != null ? ` · survives a Y1 utilisation fall to ${sens.minUtil}%` : ""}`}
                  </div>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={270}>
                <ComposedChart data={m.monthly} margin={{ top: 14, right: 8, left: 4, bottom: 0 }}>
                  <defs>
                    <linearGradient id="cashFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={C.brass} stopOpacity={0.32} />
                      <stop offset="100%" stopColor={C.brass} stopOpacity={0.04} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid stroke={C.line} vertical={false} />
                  <XAxis dataKey="month" tick={{ fontFamily: MONO, fontSize: 10, fill: C.sub }} axisLine={{ stroke: C.line }} tickLine={false} interval={1} />
                  <YAxis tick={{ fontFamily: MONO, fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} tickFormatter={(v) => f0(v)} />
                  <Tooltip formatter={(v) => f0(v)} labelFormatter={(l) => `Cash balance · ${l}`} contentStyle={{ fontFamily: MONO, fontSize: 12, borderRadius: 8, border: `1px solid ${C.line}` }} />
                  <ReferenceLine y={0} stroke={C.sub} />
                  <ReferenceLine y={-m.fundingBudget} stroke={C.neg} strokeDasharray="5 4" label={{ value: `Funding budget (${f0(m.fundingBudget)})`, position: "insideBottomRight", fontFamily: SANS, fontSize: 10.5, fill: C.neg }} />
                  <ReferenceLine x="M1" stroke={C.lineDk} strokeDasharray="3 3" label={{ value: "Opening", position: "insideTopLeft", fontFamily: SANS, fontSize: 10, fill: C.sub }} />
                  <Area type="monotone" dataKey="Cumulative" stroke={C.brass} strokeWidth={2.5} fill="url(#cashFill)" baseValue={0} dot={false} activeDot={{ r: 4, fill: C.brass }} />
                  {m.peakNeed > 0 && <ReferenceDot x={m.troughLabel} y={-m.peakNeed} r={4.5} fill={C.neg} stroke="#fff" strokeWidth={1.5} label={{ value: `trough ${f0(-m.peakNeed)}`, position: "bottom", fontFamily: MONO, fontSize: 10, fontWeight: 700, fill: C.neg }} />}
                </ComposedChart>
              </ResponsiveContainer>
            </div>

            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "18px 16px 8px", marginBottom: 22 }}>
              <div className="flex flex-wrap items-start justify-between" style={{ padding: "0 6px 12px", gap: 10 }}>
                <div>
                  <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Operating Cash Flow · Monthly</h3>
                  <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, marginTop: 3 }}>
                    Each bar is that month's net operating cash (Years 1–2, pre-opening excluded). Red bars mark months when large lump-sum payments fall due — rent cheques (per the selected payment terms) and the M12 insurance renewal. · SAR '000
                  </div>
                </div>
              </div>
              <ResponsiveContainer width="100%" height={220}>
                <ComposedChart data={m.monthlyOp} margin={{ top: 6, right: 8, left: 4, bottom: 0 }}>
                  <CartesianGrid stroke={C.line} vertical={false} />
                  <XAxis dataKey="month" tick={{ fontFamily: MONO, fontSize: 10, fill: C.sub }} axisLine={{ stroke: C.line }} tickLine={false} interval={1} />
                  <YAxis tick={{ fontFamily: MONO, fontSize: 11, fill: C.sub }} axisLine={false} tickLine={false} tickFormatter={(v) => f0(v)} />
                  <Tooltip formatter={(v) => f0(v)} labelFormatter={(l) => `Net cash · ${l}`} contentStyle={{ fontFamily: MONO, fontSize: 12, borderRadius: 8, border: `1px solid ${C.line}` }} />
                  <ReferenceLine y={0} stroke={C.sub} />
                  <Bar dataKey="Net cash" radius={[3, 3, 0, 0]} maxBarSize={22}>
                    {m.monthlyOp.map((d, i) => <Cell key={i} fill={d["Net cash"] < 0 ? C.neg : C.pos} />)}
                  </Bar>
                </ComposedChart>
              </ResponsiveContainer>
            </div>

            {/* Financials */}
            <div id="financials" style={{ scrollMarginTop: 150 }}>
              <SectionHeader eyebrow="05 · Financials" title="Five-Year P&L" sub="Full income statement at the current assumptions. Figures in SAR '000." />
            </div>
            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 28 }} className="print-section print-break">
              <div style={{ padding: "14px 18px", borderBottom: `1px solid ${C.line}` }}>
                <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Five-year P&amp;L · SAR '000</h3>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: MONO, fontSize: 12.5 }}>
                  <thead>
                    <tr>
                      <th style={{ ...th, textAlign: "left", fontFamily: SANS }}>Line item</th>
                      {m.years.map((y) => <th key={y.year} style={th}>{y.year}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {pnlRows.map(([label, key, kind]) => (
                      <tr key={key} style={{ background: kind === "head" ? "#F3EFE6" : "transparent" }}>
                        <td style={{ ...td, textAlign: "left", fontFamily: SANS, fontWeight: kind === "head" ? 700 : kind === "sub" ? 600 : 400, color: kind === "neg" ? C.sub : C.text }}>{label}</td>
                        {m.years.map((y) => {
                          const v = y[key];
                          const neg = kind === "neg";
                          const isLoss = (key === "ebitda" || key === "ni" || key === "preshare") && v < 0;
                          return <td key={y.year} style={{ ...td, fontWeight: kind === "head" ? 700 : 400, color: isLoss ? C.neg : (neg ? C.sub : C.text) }}>{neg ? `(${f0(Math.abs(v))})` : f0(v)}</td>;
                        })}
                      </tr>
                    ))}
                    <tr>
                      <td style={{ ...td, textAlign: "left", fontFamily: SANS, fontStyle: "italic", color: C.sub }}>EBITDA margin</td>
                      {m.years.map((y) => <td key={y.year} style={{ ...td, color: y.ebitda < 0 ? C.neg : C.brass }}>{pctf(y.ebitdaPct)}</td>)}
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            {m.financedPrincipal > 0 && (
              <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", marginBottom: 28 }} className="print-section">
                <div className="flex items-baseline justify-between" style={{ padding: "14px 18px", borderBottom: `1px solid ${C.line}`, flexWrap: "wrap", gap: 8 }}>
                  <h3 style={{ fontFamily: SANS, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: C.text, margin: 0 }}>Equipment finance · amortization schedule · SAR '000</h3>
                  <span style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub }}>Level installment <span style={{ fontFamily: MONO, fontWeight: 600, color: C.text }}>{(m.monthlyPayment * 1000).toLocaleString("en-US", { maximumFractionDigits: 0 })} SAR/mo</span> · {inp.financeRate}% over {inp.financeTermYears} yrs</span>
                </div>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: MONO, fontSize: 12.5 }}>
                    <thead>
                      <tr>
                        <th style={{ ...th, textAlign: "left", fontFamily: SANS }}>Year</th>
                        <th style={th}>Opening balance</th>
                        <th style={th}>Installments paid</th>
                        <th style={th}>— Interest</th>
                        <th style={th}>— Principal</th>
                        <th style={th}>Closing balance</th>
                      </tr>
                    </thead>
                    <tbody>
                      {amortRows.map((r) => (
                        <tr key={r.year}>
                          <td style={{ ...td, textAlign: "left", fontFamily: SANS, fontWeight: 600 }}>{r.year}</td>
                          <td style={td}>{f0(r.opening)}</td>
                          <td style={td}>{f0(r.payment)}</td>
                          <td style={{ ...td, color: C.sub }}>({f0(r.interest)})</td>
                          <td style={td}>{f0(r.principal)}</td>
                          <td style={{ ...td, fontWeight: 700 }}>{f0(r.closing)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{ padding: "10px 18px", fontFamily: SANS, fontSize: 11, color: C.sub, borderTop: `1px solid ${C.line}` }}>
                  The interest column is the "Equipment finance interest" line in the P&amp;L above; the principal column is repaid from cash flow (inside Free cash flow), not through the P&amp;L. {m.financeResidual > 0 ? `The SAR ${f0(m.financeResidual)}K balance still outstanding at the end of Y5 is netted off the exit value.` : "The loan is fully repaid within the five-year horizon."}
                </div>
              </div>
            )}

            <div className="print-only print-break" style={{ marginTop: 20, marginBottom: 18 }}>
              <SectionHeader eyebrow="Appendix" title="Assumptions Used" />
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: MONO, fontSize: 11.5 }}>
                <tbody>
                  {[
                    ["Revenue per dentist (FTE) / month \u00b7 derived per chair", `${inp.revPerChair}K \u00b7 ${f0(m.revPerChairFull)}K SAR`],
                    ["Operatories (chairs)", inp.chairs],
                    ["Salaried dentists · base · profit share", `${inp.dentistCount} · ${f0(inp.dentistBase)} SAR/mo · ${inp.profitShare}%`],
                    ...(inp.seniorCount > 0 ? [["Senior dentists · days/wk · share · basis · book/mo", `${inp.seniorCount} · ${inp.seniorDays} · ${inp.seniorProdPct}% · ${inp.seniorPayBasis} · ${f0(inp.seniorRevPerChair)}K`]] : []),
                    ["Y1 utilization · ramp growth", `${inp.rampStart}% · ${inp.rampGrowth}%/yr`],
                    ["Insured share · rejection · delay", `${inp.insuredPct}% · ${inp.rejectionPct}% · ${inp.insurerDelayMo} mo`],
                    ["Materials & lab (mature)", inp.materialsPct + "%"],
                    ["Clinic lease · staff housing", `${f0(inp.clinicRent)}K · ${f0(inp.staffHousing)}K`],
                    ["Marketing · Other OpEx (mature)", `${f0(inp.marketing)}K · ${f0(inp.otherOpex)}K`],
                    ["Expats (derived) · levy · iqama", `${expatCount(inp)} · ${inp.levyPerMonth}/mo · ${inp.iqamaPerYear}/yr`],
                    ["Fit-out duration · rent terms", `${inp.fitoutMonths} mo · ${inp.rentTerms}`],
                    ["Min-cash reserve · launch liquidity", `${f0(budget.minCash)}K · ${f0(budget.launchLiquidity)}K`],
                    ["Total funding to raise", f0(budget.totalRaise) + "K"],
                    ["Exit multiple · WACC · Zakat", `${inp.exitMultiple}× · ${inp.wacc}% · ${inp.zakatPct}%`],
                  ].map(([k, v]) => (
                    <tr key={k} style={{ borderBottom: `1px solid ${C.line}` }}>
                      <td style={{ padding: "5px 10px", textAlign: "left", fontFamily: SANS, color: C.sub }}>{k}</td>
                      <td style={{ padding: "5px 10px", textAlign: "right", color: C.text }}>{v}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="print-section" style={{ fontFamily: SANS, fontSize: 11.5, color: C.sub, lineHeight: 1.6, paddingBottom: 30 }}>
              Indicative model for planning, not investment or legal advice. Dentist pay = base salary + {inp.profitShare}% of the profit on their own production (paid only when positive). Benchmarks: Riyadh rents & 2025 rent freeze (SAT Real Estate, Knight Frank); salaries (PayScale, SalaryExpert, Paylab); Saudization 55% from 27 Jan 2026 & SAR 9,000 floor (Arab News, HRSD); expat levy SAR 800/mo + iqama/permit fees (MHRSD 2026 schedules). Validate all figures with local quotations before committing capital.
            </div>
          </div>

          <AssistantWidget m={m} inp={inp} sens={sens} budget={budget} />

          {toast && (
            <div style={{ position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", background: C.ink, color: C.inv, fontFamily: SANS, fontSize: 13, fontWeight: 500, padding: "10px 18px", borderRadius: 8, border: `1px solid ${C.brass}`, zIndex: 50, boxShadow: "0 6px 24px rgba(0,0,0,0.25)" }}>{toast}</div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
