      tfoot { display: table-footer-group; }
      /* charts render as one piece and scale to the page instead of bleeding off it */
      .recharts-wrapper, .recharts-responsive-container { break-inside: avoid; page-break-inside: avoid; }

<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx" data-presets="react"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useCallback } = React;
    const { ComposedChart, BarChart, Bar, Line, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, Legend, LabelList } = window.Recharts;

    /* ============================================================
       Mall dental-hygiene pod network engine — annual, 5 years, SAR '000.
       Small mall shops selling hygiene & whitening SERVICES with an
       optional RETAIL products line. Demand ramps in appointments,
       capped by chair capacity. The network is run by a central HQ
       (its own staff, opex & capex); sterilization (CSSD) is either a
       central hub or an autoclave in each pod. An optional patient-
       funnel & consented-data layer can be switched on as upside.
       ============================================================ */
    const POD_BASE = {
      // rollout
      podsY1: 4, podsPerYear: 2,
      // format & capacity
      chairs: 4, apptsPerChairDay: 15, daysPerMonth: 26,
      // appointment-based demand ramp (appts / chair / day), capped by capacity (apptsPerChairDay)
      apptsOpen: 10, apptsRampPerYr: 5,
      // service revenue (hygiene & whitening)
      // service pricing split by type: hygiene (frequent) vs whitening (occasional, higher ticket)
      hygieneTicket: 150, whiteningTicket: 200, whiteningMixPct: 15,
      // retail products (optional module)
      inclRetail: false, retailAttachPct: 35, retailBasket: 180, retailMarginPct: 45,
      // pod staff & opex (per pod / month, SAR '000). "loaded" salaries include GOSI; the dentist
      // and HQ salaries are entered raw and loaded with gosiPct.
      rentPod: 23,
      dentistSalary: 12, podsPerDentist: 1, gosiPct: 11,
      hygienists: 3, hygSalary: 8,
      nursesPerPod: 2, nurseSalary: 5, nurseHousing: 80,
      receptionists: 0, receptionSalary: 5,
      materialsPct: 0,
      // pod overheads & statutory: utilities + mall CAM/service charges (per pod/mo), card fees (% of rev), EOSB accrual (% of payroll)
      podOverheadMo: 6, paymentFeePct: 1.5, eosbPct: 8.3,
      // CSSD / sterilization: central hub vs an autoclave per pod
      cssdCentralized: false, cssdOpexPerPod: 3, hqCxCssd: 180, cssdPerPodCapex: 70,
      // staff insurance (SAR / person / year)
      medInsPerEmp: 5000, malpracticePerClin: 5000,
      // patient insurance vs cash mix: share billed to insurers, rejection rate, and collection delay (months)
      insuredPct: 30, rejectionPct: 5, insurerDelayMo: 3,
      // HQ staff — count N and monthly salary (K SAR), loaded with GOSI
      hqAdminMgrN: 1, hqAdminMgrSal: 15,
      hqMedMgrN: 1, hqMedMgrSal: 20,
      hqAccountantN: 1, hqAccountantSal: 7,
      hqProcAdminN: 1, hqProcAdminSal: 6,
      hqMarketingN: 1, hqMarketingSal: 15,
      hqHrN: 1, hqHrSal: 12,
      hqDriverN: 1, hqDriverSal: 2,
      // HQ other opex (SAR '000 / YEAR)
      hqOffice: 60, hqIt: 10, hqProf: 0, marketingPct: 5, centralOpsPct: 2,
      // HQ capex (SAR '000, one-time)
      hqCxOffice: 200, hqCxIt: 20, hqCxBrand: 200, hqCxSetup: 50, hqCxCar: 100,
      // pod capex (SAR '000) breakdown
      cxFitout: 300, cxEquip: 200, cxXray: 120, cxItBrand: 30, cxRetail: 0, cxLicensing: 18, cxContingency: 30,
      // patient-funnel & data upside (optional module)
      inclFunnel: false,
      screensPerDay: 15, needPct: 35, consentPct: 60, acceptPct: 40, caseValue: 3500,
      mode: "hub", referralFeePct: 12, hubMarginPct: 30, chartValue: 150, inclDatabase: true,
      // capital & returns
      minCashMonths: 6, preOpenMonths: 2, exitMultiple: 5, zakatPct: 2.5, deprYears: 7, discountRate: 12, maintCapexPct: 3,
      // depreciation lives by asset class (years, straight-line)
      depFitout: 10, depEquip: 7, depIt: 4, depVehicle: 5, depIntangible: 5,
    };
    // pod CapEx breakdown (SAR '000 per pod)
    const CX_KEYS = [
      ["cxFitout", "Fit-out & millwork (mall unit)"],
      ["cxEquip", "Dental chair(s), hygiene & whitening kit"],
      ["cxXray", "X-ray / imaging unit"],
      ["cxItBrand", "IT, POS, practice-mgmt & branding"],
      ["cxRetail", "Retail fit-out & opening inventory"],
      ["cxLicensing", "MOH licensing & permits"],
      ["cxContingency", "Pre-opening & contingency"],
    ];
    // HQ CapEx breakdown
    const HQ_CX_KEYS = [
      ["hqCxOffice", "Central office fit-out"],
      ["hqCxIt", "IT / ERP / practice-management platform"],
      ["hqCxBrand", "Brand, website & launch campaign"],
      ["hqCxSetup", "Pre-opening HQ team & setup"],
      ["hqCxCar", "Vehicle / company car"],
    ];
    // HQ staff roles — key, label; each has {key}N (count) and {key}Sal (monthly K SAR)
    const HQ_STAFF = [
      ["hqAdminMgr", "Admin manager / GM"],
      ["hqMedMgr", "Medical manager"],
      ["hqAccountant", "Accountant"],
      ["hqProcAdmin", "Procurement & admin"],
      ["hqMarketing", "Marketing"],
      ["hqHr", "HR"],
      ["hqDriver", "Driver"],
    ];
    const gosiMul = (p) => 1 + (p.gosiPct || 0) / 100;
    // blended revenue per appointment from the hygiene vs whitening mix
    const blendedTicket = (p) => (p.hygieneTicket || 0) * (1 - (p.whiteningMixPct || 0) / 100) + (p.whiteningTicket || 0) * ((p.whiteningMixPct || 0) / 100);
    // pod build cost: fixed breakdown, plus a per-pod autoclave when CSSD is distributed
    const capexPerPod = (p) => CX_KEYS.reduce((s, [k]) => s + (p[k] || 0), 0) + (p.cssdCentralized ? 0 : (p.cssdPerPodCapex || 0));
    // HQ one-time capex, plus the central CSSD hub when centralized
    const hqCapexTotal = (p) => HQ_CX_KEYS.reduce((s, [k]) => s + (p[k] || 0), 0) + (p.cssdCentralized ? (p.hqCxCssd || 0) : 0);
    // depreciation: each CapEx line mapped to an asset-class life (years), straight-line
    const DEP_LIFE = { cxFitout: "depFitout", cxRetail: "depFitout", cxContingency: "depFitout", cxLicensing: "depIntangible", cxEquip: "depEquip", cxXray: "depEquip", cxItBrand: "depIt", hqCxOffice: "depFitout", hqCxIt: "depIt", hqCxBrand: "depIntangible", hqCxSetup: "depIntangible", hqCxCar: "depVehicle", hqCxCssd: "depEquip" };
    const depLife = (p, key) => Math.max(1, p[DEP_LIFE[key]] || p.deprYears || 7);
    // annual straight-line depreciation for one pod's CapEx (+ per-pod autoclave when distributed)
    const podDepPerYear = (p) => CX_KEYS.reduce((s, [k]) => s + (p[k] || 0) / depLife(p, k), 0) + (p.cssdCentralized ? 0 : (p.cssdPerPodCapex || 0) / Math.max(1, p.depEquip || 7));
    // annual straight-line depreciation for HQ CapEx (+ central CSSD hub when centralized)
    const hqDepPerYear = (p) => HQ_CX_KEYS.reduce((s, [k]) => s + (p[k] || 0) / depLife(p, k), 0) + (p.cssdCentralized ? (p.hqCxCssd || 0) / Math.max(1, p.depEquip || 7) : 0);
    // one supervising dentist covers podsPerDentist pods; per-pod cost = monthly salary loaded with GOSI, split
    const dentistPerPod = (p) => p.dentistSalary * gosiMul(p) / Math.max(1, p.podsPerDentist || 1);
    // HQ staff monthly cost (loaded)
    const hqStaffCount = (p) => HQ_STAFF.reduce((s, [k]) => s + (p[k + "N"] || 0), 0);
    const hqStaffMo = (p) => HQ_STAFF.reduce((s, [k]) => s + (p[k + "N"] || 0) * (p[k + "Sal"] || 0), 0) * gosiMul(p);
    // pod staff payroll (loaded) per month — GP + hygienists + nurses + reception (basis for the EOSB accrual)
    const podPayrollMo = (p) => dentistPerPod(p) + p.hygienists * p.hygSalary + (p.nursesPerPod || 0) * (p.nurseSalary || 0) + (p.receptionists || 0) * (p.receptionSalary || 0);
    // DIRECT fixed monthly opex per pod (rent, staff, utilities/CAM overhead, + CSSD if distributed).
    // Nurse housing is NOT here — it is charged centrally at HQ (see nurseHousingYr) across all nurses.
    const podFixedMo = (p) => p.rentPod + podPayrollMo(p) + (p.podOverheadMo || 0) + (p.cssdCentralized ? 0 : (p.cssdOpexPerPod || 0));
    // HQ FIXED monthly opex: staff + office/IT/professional (office etc. are ANNUAL inputs → /12).
    const hqFixedMo = (p) => hqStaffMo(p) + (p.hqOffice + p.hqIt + p.hqProf) / 12;
    // central CSSD throughput charged at HQ, per active pod (monthly), when sterilization is centralized
    const hqCssdPerPodMo = (p) => p.cssdCentralized ? (p.cssdOpexPerPod || 0) : 0;
    // HQ VARIABLE opex scales with revenue (best practice): marketing & central ops as a % of revenue
    const hqVarRate = (p) => ((p.marketingPct || 0) + (p.centralOpsPct || 0)) / 100;
    // nurse housing/accommodation, charged centrally at HQ — a single flat ANNUAL cost for all nurses (not per nurse)
    const nurseHousingYr = (p, pods) => (p.nurseHousing || 0);
    // full HQ annual opex = fixed base + revenue-linked variable + central CSSD per active pod + nurse housing (all nurses)
    const hqOpexYr = (p, revenue, effPods) => hqFixedMo(p) * 12 + hqVarRate(p) * revenue + hqCssdPerPodMo(p) * 12 * effPods + nurseHousingYr(p, effPods);
    // clinical & total staff per pod (for insurance headcount)
    const clinicalPerPod = (p) => 1 / Math.max(1, p.podsPerDentist || 1) + p.hygienists + (p.nursesPerPod || 0);
    const staffPerPod = (p) => clinicalPerPod(p) + (p.receptionists || 0);

    function computePods(p) {
      p = { ...POD_BASE, ...p };
      const capexPod = capexPerPod(p);
      const hqCapex = hqCapexTotal(p);
      const F = !!p.inclFunnel, R = !!p.inclRetail;
      const capacityPCD = p.apptsPerChairDay; // appts / chair / day at 100% capacity
      // cohorts: podsY1 open at the start of Y1, podsPerYear at the start of each later year.
      const cohorts = [p.podsY1, p.podsPerYear, p.podsPerYear, p.podsPerYear, p.podsPerYear];
      const years = [];
      let cumCapex = 0, cumCharts = 0, cumFCF = 0, peakNeed = 0;
      for (let i = 0; i < 5; i++) {
        let podsActive = 0, effPods = 0, appts = 0, screenings = 0, apptsPCDsum = 0, apptsPCDw = 0;
        for (let c = 0; c <= i; c++) {
          const n = cohorts[c];
          if (n <= 0) continue;
          const age = i - c;
          const open = 1; // opening-year pods trade the full year (no half-year haircut)
          // demand ramps in appointments/chair/day and is CAPPED by capacity
          const apptsPCD = Math.min(capacityPCD, p.apptsOpen + p.apptsRampPerYr * age);
          const podAppts = p.chairs * apptsPCD * p.daysPerMonth * 12 * open;
          podsActive += n; effPods += n * open;
          appts += n * podAppts;
          screenings += n * p.screensPerDay * p.daysPerMonth * 12 * open;
          apptsPCDsum += apptsPCD * n * open; apptsPCDw += n * open; // effPods-weighted average booking
        }
        const avgApptsPCD = apptsPCDw > 0 ? apptsPCDsum / apptsPCDw : 0;
        const util = capacityPCD > 0 ? avgApptsPCD / capacityPCD : 0;
        // revenue: hygiene/whitening SERVICES + optional RETAIL products
        const serviceRev = appts * blendedTicket(p) / 1000;
        const retailRev = R ? appts * (p.retailAttachPct / 100) * p.retailBasket / 1000 : 0;
        const podRev = serviceRev + retailRev;
        // optional funnel + data upside
        const cases = F ? appts * (p.needPct / 100) * (p.consentPct / 100) * (p.acceptPct / 100) : 0;
        const caseValueTotal = cases * p.caseValue / 1000;
        const referralRev = caseValueTotal * (p.referralFeePct / 100);
        const hubCapture = caseValueTotal * (p.hubMarginPct / 100);
        const funnelRev = !F ? 0 : p.mode === "referral" ? referralRev : hubCapture;
        const contacts = F ? screenings + appts * 0.5 : 0;
        cumCharts += contacts * (p.consentPct / 100);
        const newCharts = contacts * (p.consentPct / 100);
        // insurance mix: a share of billings is billed to insurers; rejected claims are lost revenue
        const denials = podRev * ((p.insuredPct || 0) / 100) * ((p.rejectionPct || 0) / 100);
        // costs
        const materials = serviceRev * (p.materialsPct / 100);
        const retailCogs = R ? retailRev * (1 - p.retailMarginPct / 100) : 0;
        const paymentFees = (podRev - denials) * ((p.paymentFeePct || 0) / 100); // card/payment processing on collected revenue
        const podDirect = podFixedMo(p) * 12 * effPods;
        const podContribution = podRev - denials - materials - retailCogs - paymentFees - podDirect;
        const hq = hqOpexYr(p, podRev + funnelRev, effPods); // fixed base + revenue-linked marketing/ops + central CSSD per pod
        // staff insurance: medical (all staff) + malpractice (clinical staff). HQ staff full year; pod staff scale with effPods.
        const totalEmp = staffPerPod(p) * effPods + hqStaffCount(p);
        const clinicalEmp = clinicalPerPod(p) * effPods;
        const insurance = (totalEmp * p.medInsPerEmp + clinicalEmp * p.malpracticePerClin) / 1000;
        // EOSB (end-of-service) accrual on loaded payroll — pod staff (scale with effPods) + HQ staff
        const eosb = (podPayrollMo(p) * 12 * effPods + hqStaffMo(p) * 12) * ((p.eosbPct || 0) / 100);
        const opEbitda = podContribution - hq - insurance - eosb;
        const ebitda = opEbitda + funnelRev;

        const newPods = cohorts[i] || 0;
        const maintCapex = cumCapex * ((p.maintCapexPct || 0) / 100); // reinvestment on the installed asset base (prior years)
        const capex = newPods * capexPod + (i === 0 ? hqCapex : 0); // growth capex: new pods + HQ deployed at launch
        cumCapex += capex;
        // depreciation by asset class: every open pod's assets + HQ assets (deployed Y1), straight-line
        const dep = podsActive * podDepPerYear(p) + hqDepPerYear(p);
        const zakat = Math.max(0, ebitda - dep) * (p.zakatPct / 100);
        const ni = ebitda - dep - zakat;
        const fcf = ni + dep - capex - maintCapex;
        cumFCF += fcf; peakNeed = Math.min(peakNeed, cumFCF);

        const totalRev = podRev + funnelRev;
        const pct = (x) => totalRev > 0 ? x / totalRev * 100 : 0;
        years.push({ year: `Y${i + 1}`, podsActive, newPods, appts, screenings, newCharts, cumCharts, cases, util,
          serviceRev, retailRev, podRev, funnelRev, referralRev, hubCapture, revenue: totalRev,
          denials, materials, retailCogs, paymentFees, podDirect, podContribution, hq, insurance, eosb, opEbitda, ebitda, ebitdaPct: pct(ebitda),
          dep, zakat, ni, capex, maintCapex, fcf, cumFCF });
      }
      const y5 = years[4];
      const dbValue = F ? cumCharts * p.chartValue / 1000 : 0;
      const inclDb = F && p.inclDatabase;
      const exitOps = Math.max(0, y5.ebitda) * p.exitMultiple;
      const exitValue = exitOps + (inclDb ? dbValue : 0);
      // returns: cohort capital deployed at the START of each year (t=i), operating cash collected at the END
      // (t=i+1), exit at t=5 — investment precedes returns.
      const totalCapex = cumCapex;
      const cfs = [0, 0, 0, 0, 0, 0];
      years.forEach((y, i) => { cfs[i] -= y.capex; cfs[i + 1] += y.ni + y.dep - y.maintCapex; });
      // 5-year IRR on operating cash flows only — the terminal exit value is deliberately excluded
      const irr = computeIRR(cfs);
      // NPV of the full investor cash flows (operating + terminal exit) at the discount rate
      const r = (p.discountRate || 0) / 100;
      const cfsFull = cfs.slice(); cfsFull[5] += exitValue;
      const npv = cfsFull.reduce((s, cf, t) => s + cf / Math.pow(1 + r, t), 0);
      // payback: first year cumulative FCF turns positive (null → beyond Y5)
      const payYr = years.find((y) => y.cumFCF >= 0);
      const paybackYear = payYr ? payYr.year : null;
      const totalPods = p.podsY1 + p.podsPerYear * 4;
      const launchLiquidity = Math.max(0, -peakNeed);
      // mature monthly fixed opex (whole network) incl. mature insurance — for the reserve
      const matureTotalEmp = staffPerPod(p) * totalPods + hqStaffCount(p);
      const matureClinicalEmp = clinicalPerPod(p) * totalPods;
      const matureInsuranceMo = (matureTotalEmp * p.medInsPerEmp + matureClinicalEmp * p.malpracticePerClin) / 1000 / 12;
      const matureNetworkFixedMo = totalPods * (podFixedMo(p) + hqCssdPerPodMo(p)) + hqFixedMo(p) + matureInsuranceMo + nurseHousingYr(p, totalPods) / 12
        + (podPayrollMo(p) * totalPods + hqStaffMo(p)) * ((p.eosbPct || 0) / 100); // fixed opex only incl. EOSB (revenue-linked card fees & marketing excluded from the cash buffer)
      const minCashReserve = Math.max(0, p.minCashMonths) * matureNetworkFixedMo;
      const capitalToRaise = launchLiquidity + minCashReserve;
      const selfFunded = Math.max(0, totalCapex - launchLiquidity);
      const totalReturned = years.reduce((a, y) => a + y.ni + y.dep - y.maintCapex, 0) + exitValue;
      const moic = totalCapex > 0 && totalReturned > 0 ? totalReturned / totalCapex : null;
      const hqFixedPerPod = totalPods > 0 ? hqFixedMo(p) / totalPods : 0;
      // Year-1 launch funding (clinic-study MONTHLY cash-trough method): raise = CapEx + launch liquidity + cash reserve.
      // A month-by-month cash curve (pre-opening + 12 operating months) finds the deepest cumulative deficit (the trough);
      // the raise covers it so the venture never runs out of cash. Ongoing opex is NOT raised — revenue funds it.
      const y1 = years[0];
      const y1Opex = y1.denials + y1.materials + y1.retailCogs + y1.paymentFees + y1.podDirect + y1.hq + y1.insurance + y1.eosb;
      // per-pod monthly economics at a given booking (appts / chair / day) — reused for mature & Year-1
      const podEcon = (apptsPCD) => {
        const appts = p.chairs * apptsPCD * p.daysPerMonth;
        const service = appts * blendedTicket(p) / 1000;
        const retail = R ? appts * (p.retailAttachPct / 100) * p.retailBasket / 1000 : 0;
        const cases = F ? appts * (p.needPct / 100) * (p.consentPct / 100) * (p.acceptPct / 100) : 0;
        const funnel = F ? cases * p.caseValue / 1000 * ((p.mode === "referral" ? p.referralFeePct : p.hubMarginPct) / 100) : 0;
        const denials = (service + retail) * ((p.insuredPct || 0) / 100) * ((p.rejectionPct || 0) / 100);
        const materials = service * (p.materialsPct / 100);
        const retailCogs = R ? retail * (1 - p.retailMarginPct / 100) : 0;
        const paymentFees = (service + retail - denials) * ((p.paymentFeePct || 0) / 100);
        const eosb = podPayrollMo(p) * ((p.eosbPct || 0) / 100); // pod-staff EOSB, monthly per pod
        const costs = podFixedMo(p) + denials + materials + retailCogs + paymentFees + eosb;
        return { apptsPCD, appts, service, retail, funnel, denials, materials, retailCogs, paymentFees, eosb, cases, costs, ebitda: service + retail + funnel - costs };
      };
      const mApptsPCD = Math.min(capacityPCD, p.apptsOpen + p.apptsRampPerYr * 4);
      const y1ApptsPCD = Math.min(capacityPCD, p.apptsOpen);
      const maturePod = podEcon(mApptsPCD), y1Pod = podEcon(y1ApptsPCD);
      // --- Year-1 launch funding (clinic-study MONTHLY cash-trough method): raise = CapEx + launch liquidity + reserve ---
      // A month-by-month cash curve (pre-opening + 12 operating months) finds the deepest cumulative deficit (trough);
      // the raise covers it so cash never runs out. Ongoing opex is NOT raised — revenue funds it.
      const y1InsMo = ((staffPerPod(p) * p.podsY1 + hqStaffCount(p)) * p.medInsPerEmp + (clinicalPerPod(p) * p.podsY1) * p.malpracticePerClin) / 1000 / 12;
      const y1FixedNoInsMo = podFixedMo(p) * p.podsY1 + hqFixedMo(p) + nurseHousingYr(p, p.podsY1) / 12 + (podPayrollMo(p) * p.podsY1 + hqStaffMo(p)) * ((p.eosbPct || 0) / 100);
      const insFrac = (p.insuredPct || 0) / 100, rejFrac = (p.rejectionPct || 0) / 100, dLag = Math.max(0, Math.round(p.insurerDelayMo || 0));
      const preF = Math.max(0, Math.round(p.preOpenMonths || 0));
      const billMo = p.podsY1 * (y1Pod.service + y1Pod.retail);        // gross billings / month at opening booking
      const matMo = p.podsY1 * y1Pod.materials;                        // materials / month
      const varHqRate = ((p.marketingPct || 0) + (p.centralOpsPct || 0)) / 100; // revenue-linked HQ (marketing + ops)
      const insPremiumUpfront = y1InsMo * 12;                          // annual insurance premiums paid upfront at launch
      const monthlyCash = [];
      let cumCash = 0, trough = 0;
      for (let mn = -preF; mn <= 12; mn++) {
        let cf = 0;
        if (mn <= 0) {
          if (mn < 0) cf -= y1FixedNoInsMo;                            // pre-opening staff / rent / overhead each month
          if (mn === -preF) cf -= insPremiumUpfront;                   // insurance premiums paid upfront
        } else {
          const insuredColl = (mn - dLag) >= 1 ? insFrac * (1 - rejFrac) * billMo : 0; // insured billed dLag months ago
          const cashColl = (1 - insFrac) * billMo;                     // cash/card patients pay at visit
          const cardFees = cashColl * ((p.paymentFeePct || 0) / 100);  // card fees only on cash/card collections
          cf += cashColl + insuredColl - y1FixedNoInsMo - matMo - cardFees - varHqRate * billMo;
        }
        cumCash += cf;
        if (cumCash < trough) trough = cumCash;
        monthlyCash.push({ month: mn < 0 ? `P${preF + mn + 1}` : mn === 0 ? "Open" : `M${mn}`, net: Math.round(cf), cum: Math.round(cumCash) });
      }
      const y1LaunchLiq = Math.max(0, -trough);                        // deepest cumulative cash deficit during the launch window
      const y1Reserve = Math.max(0, p.minCashMonths) * y1Opex / 12;    // cash cushion: a few months of full running cost
      const y1FundNeed = y1.capex + y1LaunchLiq + y1Reserve;
      const podPayback = maturePod.ebitda > 0 ? capexPod / (maturePod.ebitda * 12) : null;
      const matureRevAnnual = (maturePod.service + maturePod.retail + maturePod.funnel) * totalPods * 12;
      const matureHqPerPodMo = totalPods > 0 ? hqOpexYr(p, matureRevAnnual, totalPods) / totalPods / 12 : 0; // all-in HQ per pod at maturity (monthly)
      const netPerPod = maturePod.ebitda - matureHqPerPodMo - matureInsuranceMo / totalPods;
      // Steady-state annual P&L: the selected pod count, all mature — pod feasibility without expansion noise
      const sPods = totalPods, sMul = sPods * 12;
      const sServiceRev = maturePod.service * sMul, sRetailRev = maturePod.retail * sMul, sFunnelRev = maturePod.funnel * sMul;
      const sPodRev = sServiceRev + sRetailRev, sRevenue = sPodRev + sFunnelRev;
      const sHq = hqOpexYr(p, sRevenue, sPods);
      const sIns = matureInsuranceMo * 12;
      const sDenials = sPodRev * ((p.insuredPct || 0) / 100) * ((p.rejectionPct || 0) / 100);
      const sMaterials = maturePod.materials * sMul, sRetailCogs = maturePod.retailCogs * sMul, sPodDirect = podFixedMo(p) * sMul;
      const sPaymentFees = (sPodRev - sDenials) * ((p.paymentFeePct || 0) / 100);
      const sEosb = (podPayrollMo(p) * sPods + hqStaffMo(p)) * 12 * ((p.eosbPct || 0) / 100);
      const sPodContribution = sPodRev - sDenials - sMaterials - sRetailCogs - sPaymentFees - sPodDirect;
      const sOpEbitda = sPodContribution - sHq - sIns - sEosb, sEbitda = sOpEbitda + sFunnelRev;
      const sDep = sPods * podDepPerYear(p) + hqDepPerYear(p);
      const sZakat = Math.max(0, sEbitda - sDep) * (p.zakatPct / 100);
      const steady = { pods: sPods, serviceRev: sServiceRev, retailRev: sRetailRev, funnelRev: sFunnelRev, podRev: sPodRev, revenue: sRevenue, denials: sDenials,
        materials: sMaterials, retailCogs: sRetailCogs, paymentFees: sPaymentFees, podDirect: sPodDirect, podContribution: sPodContribution, hq: sHq, insurance: sIns, eosb: sEosb,
        opEbitda: sOpEbitda, ebitda: sEbitda, ebitdaPct: sRevenue > 0 ? sEbitda / sRevenue * 100 : 0, dep: sDep, zakat: sZakat, ni: sEbitda - sDep - sZakat };
      return { years, y5, cumCharts, dbValue, inclDb, exitOps, exitValue, irr, npv, paybackYear, discountRate: p.discountRate, moic, cumFCF,
        totalCapex, capexPod, hqCapex, totalPods, matureNetworkFixedMo, hqFixedMo: hqFixedMo(p), hqVarRate: hqVarRate(p), hqCssdPerPodMo: hqCssdPerPodMo(p), matureHqPerPodMo, matureRevAnnual,
        hqStaffMo: hqStaffMo(p), hqStaffCount: hqStaffCount(p), matureInsuranceMo, capacityPCD, mApptsPCD, y1ApptsPCD, steady, y1Pod,
        launchLiquidity, minCashReserve, capitalToRaise, selfFunded, hqFixedPerPod,
        year1: { capex: y1.capex, opex: y1Opex, launchLiq: y1LaunchLiq, monthlyCash, trough: Math.round(trough), revenue: y1.revenue, ebitda: y1.ebitda, fcf: y1.fcf, reserve: y1Reserve, fundNeed: y1FundNeed },
        mature: { apptsPCD: mApptsPCD, appts: maturePod.appts, service: maturePod.service, retail: maturePod.retail, funnel: maturePod.funnel, materials: maturePod.materials, retailCogs: maturePod.retailCogs, paymentFees: maturePod.paymentFees, eosb: maturePod.eosb, fixed: podFixedMo(p), hqPerPod: matureHqPerPodMo, hqFixedPerPod: 0, insPerPod: matureInsuranceMo / totalPods, netPerPod, costs: maturePod.costs, ebitda: maturePod.ebitda, cases: maturePod.cases, payback: podPayback } };

                <Slider label="Ramp / year (per pod age)" value={inp.apptsRampPerYr} min={0} max={6} step={0.5} unit="appts/yr" onChange={(v) => set("apptsRampPerYr", v)} hint={`matures at ${f0(m.mApptsPCD)} appts/chair/day (${(100 * m.mApptsPCD / inp.apptsPerChairDay).toFixed(0)}% of capacity), capped by capacity`} />
                <Slider label="Hygiene ticket" value={inp.hygieneTicket} min={100} max={800} step={10} unit="SAR" onChange={(v) => set("hygieneTicket", v)} hint="scaling & polishing, airflow, fluoride" />
                <Slider label="Whitening ticket" value={inp.whiteningTicket} min={200} max={2500} step={50} unit="SAR" onChange={(v) => set("whiteningTicket", v)} hint="in-office whitening — higher value, occasional" />
                <Slider label="Whitening mix" value={inp.whiteningMixPct} min={0} max={60} step={1} unit="% of appts" onChange={(v) => set("whiteningMixPct", v)} hint={`blended ticket ≈ ${f0((inp.hygieneTicket * (1 - inp.whiteningMixPct / 100) + inp.whiteningTicket * inp.whiteningMixPct / 100))} SAR/appt`} />
                <Slider label="Insured share (billed to insurers)" value={inp.insuredPct} min={0} max={100} step={5} unit="% of billings" onChange={(v) => set("insuredPct", v)} hint="the rest is paid cash/card at the visit" />
                <Slider label="Claim rejection rate" value={inp.rejectionPct} min={0} max={30} step={1} unit="%" onChange={(v) => set("rejectionPct", v)} hint="rejected insured claims are lost revenue" />
                <Slider label="Insurer payment delay" value={inp.insurerDelayMo} min={0} max={9} step={1} unit="months" onChange={(v) => set("insurerDelayMo", v)} hint="delays insured collections — deepens the Year-1 cash trough" />
                <div style={{ ...fw, fontFamily: SANS, fontSize: 10.5, color: C.sub, marginTop: 4 }}>Bookings never exceed capacity; the utilization each year is the appts booked ÷ capacity.</div>
              </Card>
              {R && (
                <Card n="C" title="Retail products" cols={2}>
                  <Slider label="Retail attach rate" value={inp.retailAttachPct} min={0} max={80} step={5} unit="% of patients" onChange={(v) => set("retailAttachPct", v)} hint="share of hygiene patients who buy a product" />
                  <Slider label="Average retail basket" value={inp.retailBasket} min={0} max={500} step={10} unit="SAR" onChange={(v) => set("retailBasket", v)} hint="whitening kits, electric brushes, floss, sensitivity care" />
                  <Slider label="Retail gross margin" value={inp.retailMarginPct} min={20} max={70} step={1} unit="%" onChange={(v) => set("retailMarginPct", v)} hint="COGS is the rest" />
                  <div style={{ ...fw, fontFamily: SANS, fontSize: 10.5, color: C.sub, marginTop: 4 }}>Retail is a switchable module — toggle it off in the header for a pure-services model.</div>
                </Card>
              )}
              <Card n="D" title="Pod costs — opex &amp; CapEx" cols={2}>
                <div style={{ ...sub2, marginBottom: 6 }}>Staff &amp; operating (per pod / month)</div>
                <Slider label="Mall rent" value={inp.rentPod} min={5} max={40} step={1} unit="K SAR" onChange={(v) => set("rentPod", v)} />
                <Slider label="Resident GP salary" value={inp.dentistSalary} min={0} max={55} step={1} unit="K SAR/mo" onChange={(v) => set("dentistSalary", v)} hint={`+${inp.gosiPct}% GOSI, shared across ${inp.podsPerDentist} pods → ${(inp.dentistSalary * gosiMulJS(inp) / inp.podsPerDentist).toFixed(1)}K per pod`} />
                <Slider label="Pods per resident GP" value={inp.podsPerDentist} min={1} max={3} step={1} unit="pods" onChange={(v) => set("podsPerDentist", v)} />
                <Slider label="Hygienists" value={inp.hygienists} min={1} max={4} step={1} unit="staff" onChange={(v) => set("hygienists", v)} />
                <Slider label="Hygienist salary (loaded)" value={inp.hygSalary} min={0} max={22} step={0.5} unit="K SAR" onChange={(v) => set("hygSalary", v)} />
                <Slider label="Nurses / assistants per pod" value={inp.nursesPerPod} min={0} max={3} step={1} unit="staff" onChange={(v) => set("nursesPerPod", v)} />
                <Slider label="Nurse salary (loaded)" value={inp.nurseSalary} min={0} max={12} step={0.5} unit="K SAR" onChange={(v) => set("nurseSalary", v)} />
                <Slider label="Receptionists per pod" value={inp.receptionists} min={0} max={3} step={1} unit="staff" onChange={(v) => set("receptionists", v)} />
                <Slider label="Receptionist salary (loaded)" value={inp.receptionSalary} min={0} max={12} step={0.5} unit="K SAR" onChange={(v) => set("receptionSalary", v)} />
                <Slider label="Consumables & lab" value={inp.materialsPct} min={0} max={25} step={1} unit="% of service rev" onChange={(v) => set("materialsPct", v)} />
                <Slider label="Utilities, CAM & pod overhead" value={inp.podOverheadMo} min={0} max={30} step={1} unit="K SAR/mo" onChange={(v) => set("podOverheadMo", v)} hint="mall service charge / CAM + utilities, per pod" />
                <Slider label="Card & payment fees" value={inp.paymentFeePct} min={0} max={4} step={0.1} unit="% of rev" onChange={(v) => set("paymentFeePct", v)} />
                <div style={{ ...sub2, margin: "12px 0 4px" }}>Sterilization (CSSD) · {inp.cssdCentralized ? "central hub" : "per pod"}</div>
                <Slider label="CSSD opex / pod / month" value={inp.cssdOpexPerPod} min={0} max={15} step={0.5} unit="K SAR" onChange={(v) => set("cssdOpexPerPod", v)} hint={inp.cssdCentralized ? "charged at HQ, scales with active pods" : "charged inside each pod"} />
                {inp.cssdCentralized
                  ? <Slider label="Central CSSD hub — CapEx" value={inp.hqCxCssd} min={0} max={500} step={10} unit="K SAR" onChange={(v) => set("hqCxCssd", v)} hint="one-time; part of HQ CapEx" />
                  : <Slider label="Per-pod autoclave — CapEx" value={inp.cssdPerPodCapex} min={0} max={200} step={5} unit="K SAR" onChange={(v) => set("cssdPerPodCapex", v)} hint="added to each pod's build cost" />}
                <div style={{ ...sub2, margin: "12px 0 4px" }}>Pod CapEx (SAR '000, one-time)</div>
                {CX_KEYS.map(([k, label]) => (
                  <Slider key={k} label={label} value={inp[k]} min={0} max={["cxFitout", "cxEquip", "cxXray"].includes(k) ? 500 : 120} step={5} unit="K SAR" onChange={(v) => set(k, v)} />
                ))}
                <div style={{ ...bSub, ...fw, marginTop: 8 }}><span>CapEx per pod{inp.cssdCentralized ? "" : " (incl. autoclave)"}</span><span style={bVal}>{f0(m.capexPod)}K</span></div>
              </Card>
              <Card n="E" title="Insurance & statutory" cols={2}>
                <Slider label="Medical insurance / employee" value={inp.medInsPerEmp} min={0} max={12000} step={250} unit="SAR/yr" onChange={(v) => set("medInsPerEmp", v)} hint="CCHI cover for every employee (pods + HQ)" />
                <Slider label="Malpractice / clinical staff" value={inp.malpracticePerClin} min={0} max={15000} step={250} unit="SAR/yr" onChange={(v) => set("malpracticePerClin", v)} hint="dentists, hygienists & nurses" />
                <Slider label="EOSB accrual (% of payroll)" value={inp.eosbPct} min={0} max={12} step={0.1} unit="%" onChange={(v) => set("eosbPct", v)} hint="end-of-service benefit accrual — KSA ~8.3%" />
                <div style={{ ...bSub, ...fw, marginTop: 8 }}><span>Mature insurance / mo</span><span style={bVal}>{f0(m.matureInsuranceMo)}K</span></div>
              </Card>
              <Card n="F" title="HQ costs — staff, opex &amp; CapEx" cols={2}>
                <div style={{ ...sub2, marginBottom: 6 }}>Central staff (count × K SAR/mo)</div>
                {HQ_STAFF.map(([k, label]) => (
                  <div key={k} style={{ marginBottom: 10 }}>
                    <div style={{ fontFamily: SANS, fontSize: 11.5, color: C.text, marginBottom: 3, display: "flex", justifyContent: "space-between" }}><span>{label}</span><span style={{ fontFamily: MONO, color: C.sub }}>{inp[k + "N"]} × {f0(inp[k + "Sal"])}K</span></div>
                    <div className="flex" style={{ gap: 8 }}>
                      <div style={{ flex: "0 0 78px" }}><Slider label="count" value={inp[k + "N"]} min={0} max={5} step={1} unit="" onChange={(v) => set(k + "N", v)} compact /></div>
                      <div style={{ flex: 1 }}><Slider label="salary" value={inp[k + "Sal"]} min={0} max={60} step={1} unit="K/mo" onChange={(v) => set(k + "Sal", v)} compact /></div>
                    </div>
                  </div>
                ))}
                <div style={{ ...bSub, ...fw, marginTop: 4 }}><span>HQ staff /mo (+{inp.gosiPct}% GOSI)</span><span style={bVal}>{f0(m.hqStaffMo)}K</span></div>
                <div style={{ ...sub2, margin: "12px 0 4px" }}>Other HQ opex (SAR '000 / year)</div>
                <Slider label="Office rent & admin" value={inp.hqOffice} min={0} max={480} step={5} unit="K SAR/yr" onChange={(v) => set("hqOffice", v)} />
                <Slider label="IT / ERP / software" value={inp.hqIt} min={0} max={360} step={5} unit="K SAR/yr" onChange={(v) => set("hqIt", v)} />
                <Slider label="Professional & compliance" value={inp.hqProf} min={0} max={360} step={5} unit="K SAR/yr" onChange={(v) => set("hqProf", v)} />
                <Slider label="Nurse housing cost" value={inp.nurseHousing} min={0} max={600} step={1} unit="K SAR/yr" onChange={(v) => set("nurseHousing", v)} hint="total annual accommodation cost for all nurses — charged at HQ" />
                <Slider label="Marketing (% of revenue)" value={inp.marketingPct} min={0} max={15} step={0.5} unit="% rev" onChange={(v) => set("marketingPct", v)} hint="brand & campaigns — scales with revenue (best practice)" />
                <Slider label="Central ops / QA (% of revenue)" value={inp.centralOpsPct} min={0} max={10} step={0.5} unit="% rev" onChange={(v) => set("centralOpsPct", v)} hint="central operations, quality & compliance — scales with revenue" />
                <div style={{ ...sub2, margin: "12px 0 4px" }}>HQ CapEx (SAR '000, one-time)</div>
                {HQ_CX_KEYS.map(([k, label]) => (
                  <Slider key={k} label={label} value={inp[k]} min={0} max={500} step={10} unit="K SAR" onChange={(v) => set(k, v)} />
                ))}
                <div style={{ ...bSub, ...fw, marginTop: 8 }}><span>HQ CapEx (incl. CSSD hub if central)</span><span style={bVal}>{f0(m.hqCapex)}K</span></div>
              </Card>
              <Card n="G" title="Capital & returns" cols={2}>
                <Slider label="Pre-opening period" value={inp.preOpenMonths} min={0} max={6} step={1} unit="mo fixed opex" onChange={(v) => set("preOpenMonths", v)} hint="months of fixed cash burn before opening — feeds the launch cash trough" />
                <Slider label="Minimum-cash reserve" value={inp.minCashMonths} min={0} max={6} step={1} unit="mo opex" onChange={(v) => set("minCashMonths", v)} />
                <Slider label="Exit multiple (Y5 EBITDA)" value={inp.exitMultiple} min={0} max={10} step={0.5} unit="×" onChange={(v) => set("exitMultiple", v)} />
                <Slider label="Discount rate (NPV)" value={inp.discountRate} min={0} max={30} step={0.5} unit="%" onChange={(v) => set("discountRate", v)} hint="cost of capital used to discount cash flows" />
                <Slider label="Maintenance CapEx / yr" value={inp.maintCapexPct} min={0} max={10} step={0.5} unit="% of deployed" onChange={(v) => set("maintCapexPct", v)} hint="annual reinvestment on the installed asset base" />
                <div style={{ ...fw, fontFamily: SANS, fontSize: 10.5, color: C.sub, marginTop: 6 }}>Depreciation is straight-line by asset class (fit-out 10y · equipment 7y · IT 4y · vehicle 5y · intangibles 5y) and shown in the P&L.</div>
              </Card>
              {F && (
                <Card n="J" title="Patient-funnel & data upside" cols={2}>
                  <Slider label="Free screenings / pod / day" value={inp.screensPerDay} min={0} max={40} step={1} unit="people" onChange={(v) => set("screensPerDay", v)} hint="intraoral-camera walk-up funnel — the data engine" />
                  <Slider label="Found needing treatment" value={inp.needPct} min={10} max={60} step={1} unit="%" onChange={(v) => set("needPct", v)} />
                  <Slider label="PDPL consent opt-in" value={inp.consentPct} min={10} max={95} step={5} unit="%" onChange={(v) => set("consentPct", v)} hint="explicit opt-in — nothing moves without it" />
                  <Slider label="Accepts a treatment plan" value={inp.acceptPct} min={10} max={80} step={5} unit="%" onChange={(v) => set("acceptPct", v)} />
                  <Slider label="Average treatment case value" value={inp.caseValue} min={1000} max={10000} step={250} unit="SAR" onChange={(v) => set("caseValue", v)} />
                  {inp.mode === "referral"
                    ? <Slider label="Referral / coordination fee" value={inp.referralFeePct} min={3} max={25} step={1} unit="%" onChange={(v) => set("referralFeePct", v)} />
                    : <Slider label="Hub margin on treatment" value={inp.hubMarginPct} min={10} max={50} step={1} unit="%" onChange={(v) => set("hubMarginPct", v)} />}
                  <Slider label="Value per consented chart" value={inp.chartValue} min={0} max={500} step={10} unit="SAR" onChange={(v) => set("chartValue", v)} />
                  <label className="flex items-center" style={{ ...fw, gap: 8, fontFamily: SANS, fontSize: 12.5, color: C.text, cursor: "pointer", marginTop: 4 }}>
                    <input type="checkbox" checked={inp.inclDatabase} onChange={(e) => set("inclDatabase", e.target.checked)} />
                    Include database asset value in the exit
                  </label>
                </Card>
              )}
            </div>

            {/* revenue chart */}
            <SectionHeader eyebrow="02 · Build-out" title="Network revenue & EBITDA" sub={`Stacked bars: hygiene/whitening services${R ? " + retail" : ""}${F ? " + funnel capture" : ""}. Pods trade the full year from opening.`} />
            <div className="print-avoid" style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 10, padding: "18px 14px 8px", marginBottom: 34 }}>
              <ResponsiveContainer width="100%" height={280}>
                <ComposedChart data={chartRev} margin={{ top: 5, right: 16, left: 0, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.line} />
                  <XAxis dataKey="year" tick={{ fontFamily: SANS, fontSize: 12, fill: C.sub }} />
                  <YAxis tick={{ fontFamily: MONO, fontSize: 11, fill: C.sub }} />
                  <Tooltip formatter={(v) => f0(v) + "K"} contentStyle={{ fontFamily: SANS, fontSize: 12, border: `1px solid ${C.line}` }} />
                  <Legend wrapperStyle={{ fontFamily: SANS, fontSize: 12 }} />
                  <Bar dataKey={revLabel} stackId="r" fill={C.ink2} radius={R || F ? [0, 0, 0, 0] : [4, 4, 0, 0]} />
                  {R && <Bar dataKey="Retail" stackId="r" fill={C.brassLt} radius={F ? [0, 0, 0, 0] : [4, 4, 0, 0]} />}
                  {F && <Bar dataKey={funnelKey} stackId="r" fill={C.brass} radius={[4, 4, 0, 0]} />}
                  <Line dataKey="EBITDA" stroke={C.pos} strokeWidth={2.5} dot={{ r: 3 }} />
                </ComposedChart>
              </ResponsiveContainer>
            </div>

            {/* capital & cost structure */}
            <SectionHeader eyebrow="03 · Capital & cost structure" title="CapEx, OpEx & funding" sub="What it costs to build and run a pod, what the central HQ costs to build and run, and the cash to put in to launch the network." />
            <div className="grid" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(290px, 1fr))", gap: 16, marginBottom: 20 }}>
              {/* Pod CapEx */}
              <div className="print-avoid" style={card}>
                <div style={bTitle}>1 · CapEx per pod (SAR '000)</div>
                {CX_KEYS.map(([k, label]) => (
                  <div key={k} style={bRow}><span style={{ color: C.sub }}>{label}</span><span style={bVal}>{f0(inp[k])}</span></div>
                ))}
                {!inp.cssdCentralized && <div style={bRow}><span style={{ color: C.sub }}>Per-pod autoclave (CSSD)</span><span style={bVal}>{f0(inp.cssdPerPodCapex)}</span></div>}
                <div style={bSub}><span>Build cost per pod</span><span style={bVal}>{f0(m.capexPod)}</span></div>
                <div style={{ ...bRow, marginTop: 6 }}><span style={{ color: C.sub }}>× {totalPods} pods by Y5</span><span style={bVal}>{f0(m.capexPod * totalPods)}</span></div>
              </div>
              {/* Pod OpEx */}
              <div className="print-avoid" style={card}>
                <div style={bTitle}>2 · Pod direct OpEx (SAR '000 / month)</div>
                <div style={bRow}><span style={{ color: C.sub }}>Mall rent</span><span style={bVal}>{f0(inp.rentPod)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Resident GP (loaded ÷ {inp.podsPerDentist})</span><span style={bVal}>{f0(inp.dentistSalary * gosiMulJS(inp) / inp.podsPerDentist)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Hygienists ({inp.hygienists})</span><span style={bVal}>{f0(inp.hygienists * inp.hygSalary)}</span></div>
                {inp.nursesPerPod > 0 && <div style={bRow}><span style={{ color: C.sub }}>Nurses / assistants ({inp.nursesPerPod})</span><span style={bVal}>{f0(inp.nursesPerPod * inp.nurseSalary)}</span></div>}
                {inp.receptionists > 0 && <div style={bRow}><span style={{ color: C.sub }}>Receptionists ({inp.receptionists})</span><span style={bVal}>{f0(inp.receptionists * inp.receptionSalary)}</span></div>}
                {inp.podOverheadMo > 0 && <div style={bRow}><span style={{ color: C.sub }}>Utilities, CAM & overhead</span><span style={bVal}>{f0(inp.podOverheadMo)}</span></div>}
                {!inp.cssdCentralized && <div style={bRow}><span style={{ color: C.sub }}>CSSD (per-pod autoclave)</span><span style={bVal}>{f0(inp.cssdOpexPerPod)}</span></div>}
                <div style={{ ...bRow, fontWeight: 600 }}><span style={{ color: C.text }}>Direct fixed / pod</span><span style={bVal}>{f0(m.mature.fixed)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>+ Consumables ({inp.materialsPct}% svc)</span><span style={bVal}>{f0(m.mature.materials)}</span></div>
                {R && <div style={bRow}><span style={{ color: C.sub }}>+ Retail COGS</span><span style={bVal}>{f0(m.mature.retailCogs)}</span></div>}
                {inp.paymentFeePct > 0 && <div style={bRow}><span style={{ color: C.sub }}>+ Card fees ({inp.paymentFeePct}%)</span><span style={bVal}>{f0(m.mature.paymentFees)}</span></div>}
                {inp.eosbPct > 0 && <div style={bRow}><span style={{ color: C.sub }}>+ EOSB ({inp.eosbPct}% payroll)</span><span style={bVal}>{f0(m.mature.eosb)}</span></div>}
                <div style={bSub}><span>All-in direct / pod (mature)</span><span style={bVal}>{f0(m.mature.costs)}</span></div>
              </div>
              {/* HQ CapEx */}
              <div className="print-avoid" style={card}>
                <div style={bTitle}>3 · HQ / central CapEx (SAR '000)</div>
                {HQ_CX_KEYS.map(([k, label]) => (
                  <div key={k} style={bRow}><span style={{ color: C.sub }}>{label}</span><span style={bVal}>{f0(inp[k])}</span></div>
                ))}
                {inp.cssdCentralized && <div style={bRow}><span style={{ color: C.sub }}>Central CSSD / sterilization hub</span><span style={bVal}>{f0(inp.hqCxCssd)}</span></div>}
                <div style={bSub}><span>Total HQ CapEx (one-time)</span><span style={bVal}>{f0(m.hqCapex)}</span></div>
              </div>
              {/* HQ OpEx */}
              <div className="print-avoid" style={card}>
                <div style={bTitle}>4 · HQ OpEx (SAR '000 / year)</div>
                {HQ_STAFF.map(([k, label]) => (inp[k + "N"] > 0 &&
                  <div key={k} style={bRow}><span style={{ color: C.sub }}>{label} ({inp[k + "N"]})</span><span style={bVal}>{f0(inp[k + "N"] * inp[k + "Sal"] * gosiMulJS(inp) * 12)}</span></div>
                ))}
                <div style={bRow}><span style={{ color: C.sub }}>Office · IT · professional</span><span style={bVal}>{f0(inp.hqOffice + inp.hqIt + inp.hqProf)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Nurse housing (all nurses)</span><span style={bVal}>{f0(inp.nurseHousing)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Marketing ({inp.marketingPct}% of Y1 rev)</span><span style={bVal}>{f0(inp.marketingPct / 100 * m.year1.revenue)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Central ops / QA ({inp.centralOpsPct}% of Y1 rev)</span><span style={bVal}>{f0(inp.centralOpsPct / 100 * m.year1.revenue)}</span></div>
                {inp.cssdCentralized && <div style={bRow}><span style={{ color: C.sub }}>Central CSSD × {inp.podsY1} pods (Y1)</span><span style={bVal}>{f0(m.hqCssdPerPodMo * 12 * inp.podsY1)}</span></div>}
                <div style={bSub}><span>Total HQ opex / year (Year 1)</span><span style={bVal}>{f0(m.hqStaffMo * 12 + (inp.hqOffice + inp.hqIt + inp.hqProf) + inp.nurseHousing + (inp.marketingPct + inp.centralOpsPct) / 100 * m.year1.revenue + (inp.cssdCentralized ? m.hqCssdPerPodMo * 12 * inp.podsY1 : 0))}</span></div>
              </div>
              {/* Year 1 */}
              <div className="print-avoid" style={card}>
                <div style={bTitle}>5 · Year 1 — fund needed</div>
                <div style={bRow}><span style={{ color: C.sub }}>Year-1 CapEx (pilot pods + HQ)</span><span style={bVal}>{f0(m.year1.capex)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Launch liquidity (cash trough)</span><span style={bVal}>{f0(m.year1.launchLiq)}</span></div>
                <div style={bRow}><span style={{ color: C.sub }}>Minimum-cash reserve ({inp.minCashMonths}mo)</span><span style={bVal}>{f0(m.year1.reserve)}</span></div>
                <div style={bSub}><span>Fund needed for Year 1</span><span style={bVal}>{f0(m.year1.fundNeed)}</span></div>
                <div style={{ fontFamily: SANS, fontSize: 10.5, color: C.sub, marginTop: 8, lineHeight: 1.5 }}>CapEx + launch liquidity + reserve. Launch liquidity is the deepest cumulative cash deficit ({f0(-m.year1.trough)}K) over {inp.preOpenMonths}mo pre-opening + the Year-1 ramp (incl. {inp.insurerDelayMo}mo insurer delay). Ongoing opex is funded by revenue as it comes in.</div>
              </div>

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
